apiVersion: notification.cp.ei.telekom.de/v1
kind: NotificationTemplate
metadata:
  name: secret-rotation-completed-email
spec:
  purpose: "secret-rotation-completed"
  channelType: "Email"
  subjectTemplate: "[Control Plane] Secret rotated for application {{ .application }}"
  template: |
    The client secret for application "{{ .application }}" (team: {{ .team }})
    in environment "{{ .environment }}" has been successfully rotated.

    The previous secret remains valid until {{ .rotatedExpiresAt }}.
    The new secret is active since {{ .currentExpiresAt }}.

    Please ensure all consumers are updated before the grace period ends.
  schema: {}
