apiVersion: notification.cp.ei.telekom.de/v1
kind: NotificationTemplate
metadata:
  name: secret-rotation-expiring-email
spec:
  purpose: "secret-rotation-expiring"
  channelType: "Email"
  subjectTemplate: "[Control Plane] Secret expiring for application {{ .application }}"
  template: |
    The client secret for application "{{ .application }}" (team: {{ .team }})
    in environment "{{ .environment }}" will expire at {{ .currentExpiresAt }}.

    You must rotate your secret before this time to avoid service disruption.
    To rotate, set spec.secret to "rotate" on your Application resource.
  schema: {}
