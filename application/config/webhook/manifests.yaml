---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-application-cp-ei-telekom-de-v1-application
  failurePolicy: Fail
  name: mapplication-v1.kb.io
  rules:
  - apiGroups:
    - application.cp.ei.telekom.de
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - applications
  sideEffects: None
