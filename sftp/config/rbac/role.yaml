---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - sftp.cp.ei.telekom.de
  resources:
  - instances
  - sftpserviceconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - sftp.cp.ei.telekom.de
  resources:
  - instances/finalizers
  - sftpserviceconfigs/finalizers
  - users/finalizers
  verbs:
  - update
- apiGroups:
  - sftp.cp.ei.telekom.de
  resources:
  - instances/status
  - sftpserviceconfigs/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - sftp.cp.ei.telekom.de
  resources:
  - users
  verbs:
  - get
  - list
  - patch
  - update
  - watch
