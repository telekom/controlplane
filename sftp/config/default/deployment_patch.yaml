apiVersion: apps/v1
kind: Deployment
metadata:
  name: controller-manager
  namespace: system
spec:
  template:
    spec:
      containers:
      - name: manager
        volumeMounts:
        - name: secretmgr-token
          mountPath: /var/run/secrets/secretmgr
          readOnly: true
        - name: trust-bundle
          mountPath: /var/run/secrets/trust-bundle
          readOnly: true
      volumes:
      - name: secretmgr-token
        projected:
          sources:
          - serviceAccountToken:
              path: token
              expirationSeconds: 600
              audience: secret-manager
      - name: trust-bundle
        configMap:
          name: secret-manager-trust-bundle
