---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-sftp-cp-ei-telekom-de-v1-zoneserviceconfig
  failurePolicy: Fail
  name: vzoneserviceconfig-v1.kb.io
  rules:
  - apiGroups:
    - sftp.cp.ei.telekom.de
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - zoneserviceconfigs
  sideEffects: None
