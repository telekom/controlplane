# yaml-language-server: $schema=../schemas/config.schema.json

# Example E2E Test Configuration

# Snapshotter configuration
snapshotter:
  # url: "http://localhost:8080"
  # or
  binary: snapshotter

# RoverCtl configuration
roverctl:
  binary: "roverctl"
  run_as: "test-user"

# Test environments
environments:
  - name: "team-a"
    token: "env:TEAM_A_TOKEN"
  - name: "team-b"
    token: "env:TEAM_B_TOKEN"

# Test suites
suites:
  - name: "basic-suite"
    filepath: "basic-suite.yaml" # External suite file relative to this config-file

  - name: "multi-env-suite"
    environments:
      - "team-a"
      - "team-b"
    cases:
      - name: "version-check"
        run_policy: FailFast
        command: "--version"
        compare: true

  - name: "super-long-test-files"
    description: |
      This suite contains tests with very long configuration files to ensure
      that the system can handle large inputs without performance degradation
      or errors.
    cases:
      - name: "apply-config"
        environment: team-a
        # run_policy: RunOnSuccess (default)
        command: "apply -f ./examples/super-long-test-files"
        compare: true

      - name: "get-info"
        environment: team-a
        # run_policy: RunOnSuccess (default)
        command: "get-info --name test-rover"
        compare: true

      - name: "apply-config"
        environment: team-b
        description: |
          Applying this will result in a blocked API as the same API path
          is already exposed by team-a
        # run_policy: RunOnSuccess (default)
        command: "apply -f ./examples/super-long-test-files"
        compare: true

      - name: "get-info"
        environment: team-b
        description: |
          This must include an error message indicating the API is blocked
        # run_policy: RunOnSuccess (default)
        command: "get-info --name test-rover"
        compare: true

      - name: "delete"
        environment: team-a
        description: |
          Remove the exposure from team-a so that team-b becomes active
        run_policy: Always  # Cleanup always runs
        command: "delete -f ./examples/super-long-test-files"
        compare: true
        wait_after: 1s

      - name: "get-info"
        environment: team-b
        description: |
          This must now succeed as team-b is active
        # run_policy: RunOnSuccess (default)
        command: "get-info --name test-rover"
        compare: true

      - name: "delete"
        environment: team-b
        run_policy: Always  # Cleanup always runs
        command: "delete -f ./examples/super-long-test-files"
        compare: true