# genqlient configuration for the organization-server facade.
# Generates a type-safe GraphQL client from the CP API schema.

schema:
  - ../controlplane-api/ent.graphql
  - ../controlplane-api/schema.graphql
  - ../controlplane-api/mutation.graphql

operations:
  - internal/graphql/operations.graphql

generated: internal/graphql/generated.go

package: graphql

optional: pointer

bindings:
  Time:
    type: time.Time
  Cursor:
    type: string
