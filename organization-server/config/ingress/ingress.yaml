apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: organization-server-ingress
  namespace: system
  annotations:
spec:
  rules:
  - host: organization-server.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: organization-server-service
            port:
              number: 8080
