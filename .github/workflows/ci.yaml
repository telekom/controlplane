name: Run CI

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    tags:
      - 'v*'
  pull_request:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at midnight UTC

permissions:
  contents: read
  pull-requests: write
  checks: write
  security-events: write
  packages: write
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs: 
  common:
    name: Common
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: common
      module: common
      run_check_generated_files: false
      run_build_image: false
      coverage_threshold: 55

  common-server:
    name: Common Server
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: common-server
      module: common-server
      run_check_generated_files: false
      ko_build_path: "cmd/server/server.go"
      
  common-server-helm:
    name: Common Server Helm Chart
    needs: common-server
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/helm-release.yaml
    with: 
      chart_path: 'common-server/helm'

  controlplane-api:
    name: ControlPlane API
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: controlplane-api
      module: controlplane-api
      run_check_generated_files: false
      ko_build_path: "cmd/main.go"
      coverage_threshold: 1

  secret-manager:
    name: Secret Manager
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: secret-manager
      module: secret-manager
      run_check_generated_files: false
      ko_build_path: "cmd/server/server.go"
      coverage_threshold: 50

  approval:
    name: Approval
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: approval
      module: approval
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  file-manager:
    name: File Manager
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: file-manager
      module: file-manager
      run_check_generated_files: false
      ko_build_path: "cmd/server/server.go"
      coverage_threshold: 61
      lint_fail_on_issues: true

  gateway:
    name: Gateway
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: gateway
      module: gateway
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      coverage_threshold: 56

  identity:
    name: Identity
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: identity
      module: identity
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"

  organization:
    name: Organization
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: organization
      module: organization
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  admin:
    name: Admin
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: admin
      module: admin
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  application:
    name: Application
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: application
      module: application
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  api:
    name: Api
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: api
      module: api
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"

  rover:
    name: Rover
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: rover
      module: rover
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      coverage_threshold: 66

  rover-server:
    name: Rover-Server
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: rover-server
      module: rover-server
      run_check_generated_files: false
      ko_build_path: "cmd/main.go"
      coverage_threshold: 41

  rover-ctl:
    name: Rover-CTL
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: rover-ctl
      module: rover-ctl
      run_check_generated_files: false
      ko_build_path: "main.go"

  snapshotter:
    name: Snapshotter
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: tools-snapshotter
      module: tools/snapshotter
      run_check_generated_files: false
      run_lint: false
      ko_build_path: "main.go"
      coverage_threshold: 3

  notification:
    name: Notification
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: notification
      module: notification
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  event:
    name: Event
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: event
      module: event
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  discovery-server:
    name: Discovery Server
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: discovery-server
      module: discovery-server
      run_check_generated_files: false
      ko_build_path: "cmd/main.go"

  pubsub:
    name: PubSub
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: pubsub
      module: pubsub
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      lint_fail_on_issues: true

  projector:
    name: Projector
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: projector
      module: projector
      run_check_generated_files: false
      ko_build_path: "main.go"

  permission:
    name: Permission
    uses: ./.github/workflows/reusable-go-ci.yaml
    with:
      name: permission
      module: permission
      run_check_generated_files: true
      ko_build_path: "cmd/main.go"
      coverage_threshold: 66
      lint_fail_on_issues: true