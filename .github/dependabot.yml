version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: "monthly"
  - package-ecosystem: "gomod"
    schedule:
      interval: "monthly"
    directories:
      - admin
      - admin/api
      - api
      - api/api
      - application
      - application/api
      - approval
      - approval/api
      - cpapi/api
    groups:
      minor-patch:
        update-types:
          - patch
          - minor
  - package-ecosystem: "gomod"
    schedule:
      interval: "monthly"
    directories:
      - common
      - common-server
      - controlplane-api
      - discovery-server
      - event
      - event/api
      - file-manager
      - projector
      - secret-manager
    groups:
      minor-patch:
        update-types:
          - patch
          - minor
  - package-ecosystem: "gomod"
    schedule:
      interval: "monthly"
    directories:
      - gateway
      - gateway/api
      - identity
      - identity/api
      - notification
      - notification/api
      - organization
      - organization/api
      - organization-server
      - permission
      - permission/api
    groups:
      minor-patch:
        update-types:
          - patch
          - minor
  - package-ecosystem: "gomod"
    schedule:
      interval: "monthly"
    directories:
      - pubsub
      - pubsub/api
      - rover
      - rover/api
      - rover-ctl
      - rover-server
      - tools/route-tester
      - tools/snapshotter
    groups:
      minor-patch:
        update-types:
          - patch
          - minor