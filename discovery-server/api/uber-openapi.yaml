  schemas:
    Error:
      description: RFC-7807 conform object sent on any error
      type: object
      required:
        - type
        - title
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: number
        detail:
          type: string
        instance:
          type: string
        errorCode:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldProblem'
    FieldProblem:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        detail:
          type: string
        path:
          type: string
    Paging:
      description: Pagination information
      type: object
      properties:
        total:
          description: total number of result objects matching the search parameters
          type: integer
          minimum: 0
        page:
          description: 'number of the current page, based on the requested limit value'
          type: integer
          minimum: 1
        last_page:
          description: 'number of the last page, based on the requested limit value'
          type: integer
          minimum: 1
      required:
        - total
        - page
        - last_page
    Links:
      description: HATEOAS links for pagination
      type: object
      required:
        - first
        - self
        - last
      properties:
        first:
          type: string
          format: uri
          description: the URI of the first page for requested pagination
        self:
          type: string
          format: uri
          description: the URI for the current page for requested pagination
        last:
          type: string
          format: uri
          description: >-
            the URI for the last page for requested pagination, based on the
            requested limit value
        prev:
          type: string
          format: uri
          description: >-
            the URI for the previous page for requested pagination, based on the
            requested limit value
        next:
          type: string
          format: uri
          description: >-
            the URI for the next page for requested pagination, based on the
            requested limit value
    StateInfo:
      type: object
      properties:
        message:
          type: string
        cause:
          type: string
    Status:
      type: object
      readOnly: true
      properties:
        state:
          $ref: '#/components/schemas/State'
        processingState:
          $ref: '#/components/schemas/ProcessingState'
        time:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/StateInfo'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/StateInfo'
        infos:
          type: array
          items:
            $ref: '#/components/schemas/StateInfo'
    State:
      enum:
        - none
        - invalid
        - blocked
        - complete
      type: string
      description: Current state of this resource
      example: complete
    ProcessingState:
      enum:
        - none
        - pending
        - processing
        - failed
        - done
      type: string
      description: Current processing state of this resource
      example: pending
    StatusTimestamps:
      type: object
      properties:
        createdAt:
          description: Timestamp when this resource was created.
          type: string
          format: date-time
        processedAt:
          description: Timestamp when this resource was last processed.
          type: string
          format: date-time
    Problem:
      type: object
      properties:
        resource:
          $ref: '#/components/schemas/ResourceRef'
        context:
          type: string
        message:
          type: string
        cause:
          type: string
        details:
          type: string
    ResourceRef:
      type: object
      readOnly: true
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        path:
          type: string
    TeamRef:
      type: object
      readOnly: true
      required:
        - hub
        - name
      properties:
        hub:
          type: string
          description: 'allowed characters: [a-z],[0-9],[-]'
          pattern: '[a-z0-9-]+'
          example: eni
        name:
          type: string
          description: 'allowed characters: [a-z],[0-9],[-]'
          pattern: '[a-z0-9-]+'
          example: hyperion
        email:
          type: string
          readOnly: true
          description: contact email address of the team
          format: email
    ApplicationRef:
      type: object
      readOnly: true
      required:
        - name
      properties:
        name:
          type: string
          example: echo-app
        icto:
          type: string
          example: icto-12345
    ResourceStatusResponse:
      description: >-
        Response resource which contains information about the status of the
        resource and all its relevant sub-resources
      readOnly: true
      required:
        - state
        - processingState
        - overallStatus
      type: object
      allOf:
        - $ref: '#/components/schemas/StatusTimestamps'
        - properties:
            state:
              $ref: '#/components/schemas/State'
            processingState:
              $ref: '#/components/schemas/ProcessingState'
            overallStatus:
              description: Status of this resource and all its relevant sub-resources
              type: string
              example: blocked
            errors:
              description: List of errors that resulted while processing this resource
              type: array
              items:
                $ref: '#/components/schemas/Problem'
            warnings:
              description: List of warnings that resulted while processing this resource
              type: array
              items:
                $ref: '#/components/schemas/Problem'
            infos:
              description: List of infos that resulted while processing this resource
              type: array
              items:
                $ref: '#/components/schemas/Problem'
    Application:
      type: object
      properties:
        id:
          type: string
          example: hub42--team2--myapp
          readOnly: true
        name:
          description: 'allowed characters: [a-z],[0-9],[-]'
          type: string
          pattern: '[a-z0-9-]+'
          example: myapp
        team:
          $ref: '#/components/schemas/Team'
        zone:
          type: string
          example: aws
        icto:
          type: string
          pattern: 'icto-[0-9]{5}'
          example: icto-12345
        apid:
          type: string
          pattern: '^AP-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}$'
          example: AP-12AB-34AB-56AB
        psiid:
          type: string
          description: >-
            PSI identifier (pattern configurable via PSIID_PATTERN env var,
            default ^PSI-[0-9]{6}$)
          example: PSI-123456
        status:
          $ref: '#/components/schemas/Status'
        security:
          $ref: '#/components/schemas/Security'
    ApplicationCreateRequest:
      required:
        - hub
        - team
        - name
        - zone
      type: object
      allOf:
        - $ref: '#/components/schemas/Application'
    ApplicationUpdateRequest:
      required:
        - team
        - zone
      type: object
      properties:
        team:
          $ref: '#/components/schemas/Team'
        zone:
          type: string
          example: aws
        icto:
          type: string
          pattern: 'icto-[0-9]{5}'
          example: icto-12345
        apid:
          type: string
          pattern: '^AP-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}$'
          example: AP-12AB-34AB-56AB
        psiid:
          type: string
          description: >-
            PSI identifier (pattern configurable via PSIID_PATTERN env var,
            default ^PSI-[0-9]{6}$)
          example: PSI-123456
    ApplicationResponse:
      type: object
      readOnly: true
      required:
        - id
        - hub
        - team
        - name
        - zone
      allOf:
        - $ref: '#/components/schemas/Application'
    ApplicationListResponse:
      type: object
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        _links:
          $ref: '#/components/schemas/Links'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApplicationResponse'
    Team:
      type: object
      required:
        - hub
        - name
        - email
        - category
      description: >-
        Team is a group of people who are responsible for the application. The
        team is used for notifications and access control.
      properties:
        hub:
          type: string
          description: 'allowed characters: [a-z],[0-9],[-]'
          pattern: '[a-z0-9-]+'
          example: eni
        name:
          type: string
          description: 'allowed characters: [a-z],[0-9],[-]'
          pattern: '[a-z0-9-]+'
          example: hyperion
        email:
          type: string
          readOnly: true
          description: contact email address of the team
          format: email
        category:
          type: string
          readOnly: true
          example: CUSTOMER
    Security:
      type: object
      required:
        - ipRestrictions
      description: >-
        Contains information related to security configuration like IP
        restrictions etc.
      properties:
        ipRestrictions:
          $ref: '#/components/schemas/IpRestrictions'
    IpRestrictions:
      type: object
      description: >-
        A list of allowed IP addresses that will be used to consume APIs this
        application is subscribed to.  The IP addresses need to be in a valid
        CIDR notation. For example 125.5.89.20 or 160.77.58.30/16.
      properties:
        allow:
          type: array
          items:
            type: string
    ApiExposure:
      type: object
      properties:
        basePath:
          type: string
          pattern: '^\/[a-zA-Z0-9\/-]*$'
        upstream:
          type: string
          format: uri
        variant:
          type: string
          description: >
            Defines the type of API exposure and determines which gateway

            the route should be provisioned on.

            Supported values:

            - null or 'DEFAULT': Regular API exposure on Stargate gateway
            (backward compatible)

            - 'MCP': MCP exposure provisioned on aiGateway

            - 'TELECONTEXTMCP': MCP exposure on aiGateway with automatic
            Telecontext integration
          enum:
            - DEFAULT
            - MCP
            - TELECONTEXTMCP
          example: DEFAULT
        approval:
          $ref: '#/components/schemas/ApprovalStrategy'
        rateLimit:
          $ref: '#/components/schemas/RateLimit'
        visibility:
          $ref: '#/components/schemas/Visibility'
        security:
          $ref: '#/components/schemas/SubscriberSecurity'
        failover:
          $ref: '#/components/schemas/ExposureFailover'
        loadBalancing:
          $ref: '#/components/schemas/LoadBalancing'
        trustedTeams:
          type: array
          items:
            $ref: '#/components/schemas/TeamRef'
        removeHeaders:
          type: array
          items:
            type: string
    ApiExposureCreateRequest:
      type: object
      required:
        - basePath
        - upstream
        - visibility
      allOf:
        - $ref: '#/components/schemas/ApiExposure'
    ApiExposureListResponse:
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        _links:
          $ref: '#/components/schemas/Links'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApiExposureResponse'
    ApiExposureResponse:
      type: object
      readOnly: true
      required:
        - name
        - zone
        - basePath
        - upstream
        - visibility
      allOf:
        - $ref: '#/components/schemas/ApiExposure'
        - properties:
            name:
              type: string
              readOnly: true
              example: eni-heartbeat-v1
            zone:
              type: string
              readOnly: true
            status:
              $ref: '#/components/schemas/Status'
    ApiExposureUpdateRequest:
      type: object
      required:
        - upstream
        - basePath
        - approval
        - visibility
      allOf:
        - $ref: '#/components/schemas/ApiExposure'
    ApiSubscription:
      type: object
      properties:
        basePath:
          description: 'Must match pattern ^\/[a-zA-Z0-9\/-]*$'
          type: string
          example: /my-hub/my-app/v1
          pattern: '^\/[a-zA-Z0-9\/-]*$'
        security:
          $ref: '#/components/schemas/SubscriberSecurity'
    ApiSubscriptionCreateRequest:
      required:
        - basePath
      type: object
      allOf:
        - $ref: '#/components/schemas/ApiSubscription'
    ApiSubscriptionListResponse:
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        _links:
          $ref: '#/components/schemas/Links'
        items:
          type: array
          items:
            $ref: '#/components/schemas/ApiSubscriptionResponse'
    ApiSubscriptionResponse:
      type: object
      readOnly: true
      allOf:
        - $ref: '#/components/schemas/ApiSubscription'
        - properties:
            name:
              type: string
              readOnly: true
              example: eni-echo-v1
            zone:
              type: string
              readOnly: true
            gatewayUrl:
              type: string
              readOnly: true
              example: 'https://stargate-playground.live.dhei.telekom.de/eni/echo/v1'
            status:
              $ref: '#/components/schemas/Status'
            application:
              $ref: '#/components/schemas/ApplicationRef'
            team:
              $ref: '#/components/schemas/TeamRef'
            approval:
              $ref: '#/components/schemas/Approval'
            failover:
              $ref: '#/components/schemas/SubscriptionFailover'
    ApiSubscriptionUpdateRequest:
      required:
        - basePath
      type: object
      allOf:
        - $ref: '#/components/schemas/ApiSubscription'
    Approval:
      type: object
      readOnly: true
      required:
        - status
        - comment
      properties:
        status:
          type: string
          example: granted
        comment:
          type: string
          example: trusted team
        decider:
          type: string
          example: hyperion@telekom.de
        timestamp:
          type: string
          format: date-time
          example: '2022-09-28T16:05:46.384Z'
    ApprovalStrategy:
      enum:
        - AUTO
        - SIMPLE
        - FOUREYES
      type: string
    OAuth2:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - oauth2
        tokenEndpoint:
          type: string
        clientId:
          type: string
        clientSecret:
          type: string
        scopes:
          type: array
          items:
            type: string
        username:
          type: string
        password:
          type: string
        refreshToken:
          type: string
        grantType:
          type: string
        tokenRequest:
          type: string
          enum:
            - body
            - header
          description: >-
            Specifies if the authentication data should be sent to the external
            IDP via headers or in the body of the request
    BasicAuth:
      type: object
      required:
        - type
        - username
        - password
      properties:
        type:
          type: string
          enum:
            - basicAuth
        username:
          type: string
        password:
          type: string
    RateLimit:
      type: object
      properties:
        second:
          format: int32
          type: integer
        minute:
          format: int32
          type: integer
        hour:
          format: int32
          type: integer
        faultTolerant:
          type: boolean
        hideClientHeaders:
          type: boolean
    SubscriberSecurity:
      discriminator:
        propertyName: type
        mapping:
          oauth2: '#/components/schemas/OAuth2'
          basicAuth: '#/components/schemas/BasicAuth'
      oneOf:
        - $ref: '#/components/schemas/OAuth2'
        - $ref: '#/components/schemas/BasicAuth'
    Visibility:
      enum:
        - ENTERPRISE
        - WORLD
        - ZONE
      type: string
    SubscriptionFailover:
      type: array
      readOnly: true
      items:
        type: object
        properties:
          zone:
            type: string
            readOnly: true
            example: aws
          gatewayUrl:
            type: string
            readOnly: true
            example: 'https://stargate-playground.live.dhei.telekom.de/eni/echo/v1'
    ExposureFailover:
      type: object
      properties:
        zone:
          type: string
          example: aws
    LoadBalancing:
      type: object
      readOnly: true
      properties:
        servers:
          type: array
          readOnly: true
          items:
            $ref: '#/components/schemas/Server'
    Server:
      type: object
      readOnly: true
      properties:
        upstream:
          type: string
          readOnly: true
        weight:
          type: integer
          readOnly: true
    EventVisibility:
      enum:
        - World
        - Zone
        - Enterprise
      type: string
      description: |
        Defines who can see and subscribe to an exposed event.
        Maps to EventExposureSpec.Visibility in the EventExposure CR.
    EventApprovalStrategy:
      enum:
        - Auto
        - Simple
        - FourEyes
      type: string
      description: |
        Defines the approval mode for event subscriptions.
        Maps to EventExposureSpec.Approval.Strategy in the EventExposure CR.
    DeliveryType:
      enum:
        - Callback
        - ServerSentEvent
      type: string
      description: |
        Defines how events are delivered to subscribers.
        Maps to EventSubscriptionSpec.Delivery.Type in the EventSubscription CR.
    PayloadType:
      enum:
        - Data
        - DataRef
      type: string
      description: >
        Defines the event payload format.

        Maps to EventSubscriptionSpec.Delivery.Payload in the EventSubscription
        CR.
    ResponseFilterMode:
      enum:
        - Include
        - Exclude
      type: string
      description: >-
        Controls whether the response filter includes or excludes the specified
        fields.
    EventApproval:
      type: object
      description: |
        Configures how subscriptions to this event are approved.
        Maps to EventExposureSpec.Approval in the EventExposure CR.
      properties:
        strategy:
          $ref: '#/components/schemas/EventApprovalStrategy'
          description: Defines the approval mode. Defaults to Auto.
        trustedTeams:
          type: array
          description: >
            Teams that are trusted for auto-approval of subscriptions. By
            default your own team is trusted.
          items:
            type: string
          maxItems: 10
          example:
            - eni--hyperion
    ResponseFilter:
      type: object
      description: Controls which fields are included or excluded from the event payload.
      properties:
        paths:
          type: array
          description: JSON paths to include or exclude from the event payload.
          items:
            type: string
          example:
            - $.data.orderId
            - $.data.status
        mode:
          $ref: '#/components/schemas/ResponseFilterMode'
    SelectionFilter:
      type: object
      description: Defines criteria for selecting which events are delivered.
      properties:
        attributes:
          type: object
          description: >
            Simple key-value equality matches on CloudEvents attributes. All
            entries are AND-ed together.
          additionalProperties:
            type: string
          example:
            source: de.telekom.eni.quickstart
            type: de.telekom.eni.quickstart.v1
        expression:
          type: object
          description: >
            Arbitrary JSON filter expression tree using logical operators (and,
            or) and comparisons (eq, ge, gt, le, lt, ne). Passed through to the
            configuration backend without structural validation.
          additionalProperties: true
    EventTrigger:
      type: object
      description: |
        Defines filtering criteria for event delivery.
        Maps to EventTrigger in the EventExposure/EventSubscription CR.
      properties:
        responseFilter:
          $ref: '#/components/schemas/ResponseFilter'
        selectionFilter:
          $ref: '#/components/schemas/SelectionFilter'
    EventScope:
      type: object
      description: |
        A named scope with publisher-side trigger filtering.
        Scopes allow publishers to partition their events and apply filters.
        Maps to EventExposureSpec.Scopes[] in the EventExposure CR.
      required:
        - name
        - trigger
      properties:
        name:
          type: string
          description: Unique identifier for this scope.
          minLength: 1
          example: high-priority
        trigger:
          $ref: '#/components/schemas/EventTrigger'
    Delivery:
      type: object
      description: |
        Configures how events are delivered to the subscriber.
        Maps to EventSubscriptionSpec.Delivery in the EventSubscription CR.
      required:
        - type
      properties:
        type:
          $ref: '#/components/schemas/DeliveryType'
        payload:
          $ref: '#/components/schemas/PayloadType'
        callback:
          type: string
          format: uri
          description: >
            URL where events are delivered. Required when type is "Callback",
            must not be set for "ServerSentEvent".
          example: 'https://myapp.example.com/events/callback'
        eventRetentionTime:
          type: string
          description: How long events are retained for this subscriber.
          example: 7d
        circuitBreakerOptOut:
          type: boolean
          description: Disables the circuit breaker for this subscription.
          default: false
        retryableStatusCodes:
          type: array
          description: HTTP status codes that should trigger a retry.
          items:
            type: integer
          example:
            - 502
            - 503
            - 504
        redeliveriesPerSecond:
          type: integer
          description: Limits the rate of event redeliveries.
          example: 10
        enforceGetHttpRequestMethodForHealthCheck:
          type: boolean
          description: Forces GET for health check probes instead of HEAD.
          default: false
    EventSubscriptionApproval:
      type: object
      readOnly: true
      description: Approval status of the event subscription.
      properties:
        status:
          type: string
          example: granted
        comment:
          type: string
          example: trusted team
        decider:
          type: string
          example: hyperion@telekom.de
        timestamp:
          type: string
          format: date-time
          example: '2022-09-28T16:05:46.384Z'
    EventType:
      type: object
      description: |
        Registry entry for a known event type. Serves as the canonical reference
        that both EventExposure and EventSubscription point to.
        Maps to EventTypeSpec in the EventType CR.
      properties:
        type:
          type: string
          description: >
            Dot-separated event type identifier (e.g.
            "de.telekom.eni.quickstart.v1"). The last segment must be a version
            prefix matching the major version.
          pattern: '^[a-z0-9]+(\.[a-z0-9]+)*$'
          minLength: 1
          maxLength: 253
          example: de.telekom.eni.quickstart.v1
        version:
          type: string
          description: >
            Version of the event type specification (e.g. "1.0.0"). The major
            version must match the version suffix in the type field.
          pattern: ^\d+.*$
          example: 1.0.0
        description:
          type: string
          description: Human-readable summary of this event type.
          example: Quickstart events for the ENI platform
        specification:
          type: string
          description: >
            File ID reference from the file manager for the optional JSON schema
            that describes the event payload.
    EventTypeResponse:
      type: object
      readOnly: true
      required:
        - name
        - type
        - version
      allOf:
        - $ref: '#/components/schemas/EventType'
        - properties:
            id:
              type: string
              readOnly: true
              description: |
                The complete resource identifier of the EventType
              example: eni--hyperion--de-telekom-eni-quickstart-v1
            name:
              type: string
              readOnly: true
              description: >
                Resource name (dot-to-hyphen conversion of type, e.g.
                "de-telekom-eni-quickstart-v1").
              example: de-telekom-eni-quickstart-v1
            active:
              type: boolean
              readOnly: true
              description: >
                Whether this EventType is the active singleton for its type
                string. When multiple EventTypes exist for the same type, only
                the oldest non-deleted one is active.
            status:
              $ref: '#/components/schemas/Status'
    EventTypeListResponse:
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        _links:
          $ref: '#/components/schemas/Links'
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventTypeResponse'
    EventExposure:
      type: object
      description: |
        Declaration that an application publishes events of a specific type.
        Maps to EventExposureSpec in the EventExposure CR.
      properties:
        eventType:
          type: string
          description: >
            Dot-separated event type identifier (e.g.
            "de.telekom.eni.quickstart.v1"). References the EventType CR.
          minLength: 1
          example: de.telekom.eni.quickstart.v1
        visibility:
          $ref: '#/components/schemas/EventVisibility'
        approval:
          $ref: '#/components/schemas/EventApproval'
        scopes:
          type: array
          description: >
            Named scopes with optional publisher-side trigger filtering. Maps to
            EventExposureSpec.Scopes in the EventExposure CR.
          items:
            $ref: '#/components/schemas/EventScope'
        additionalPublisherIds:
          type: array
          description: >
            Additional application IDs allowed to publish to the same event
            type. Maps to EventExposureSpec.AdditionalPublisherIds in the
            EventExposure CR.
          items:
            type: string
          example:
            - hub42--team2--secondary-publisher
    EventExposureResponse:
      type: object
      readOnly: true
      required:
        - name
        - zone
        - eventType
        - visibility
      allOf:
        - $ref: '#/components/schemas/EventExposure'
        - properties:
            name:
              type: string
              readOnly: true
              example: de-telekom-eni-quickstart-v1
            zone:
              type: string
              readOnly: true
              description: >
                The zone where this event is exposed. Maps to
                EventExposureSpec.Zone in the EventExposure CR.
            active:
              type: boolean
              readOnly: true
              description: >
                Whether this exposure is the active one for its event type. Maps
                to EventExposureStatus.Active.
            sseUrls:
              type: object
              readOnly: true
              description: >
                Maps zone names to SSE endpoint URLs for this exposure. Maps to
                EventExposureStatus.SseURLs.
              additionalProperties:
                type: string
              example:
                aws: >-
                  https://stargate-playground.live.dhei.telekom.de/sse/eni/quickstart/v1
            callbackURL:
              type: string
              readOnly: true
              description: >
                URL of the callback gateway in the provider zone. Maps to
                EventExposureStatus.CallbackURL.
              example: >-
                https://stargate-playground.live.dhei.telekom.de/callback/eni/quickstart/v1
            status:
              $ref: '#/components/schemas/Status'
            application:
              $ref: '#/components/schemas/ApplicationRef'
            team:
              $ref: '#/components/schemas/TeamRef'
    EventExposureListResponse:
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        _links:
          $ref: '#/components/schemas/Links'
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventExposureResponse'
    EventSubscription:
      type: object
      description: |
        Declaration that an application subscribes to events of a specific type.
        Maps to EventSubscriptionSpec in the EventSubscription CR.
      properties:
        eventType:
          type: string
          description: >
            Dot-separated event type identifier (e.g.
            "de.telekom.eni.quickstart.v1"). References the EventType CR.
          minLength: 1
          example: de.telekom.eni.quickstart.v1
        delivery:
          $ref: '#/components/schemas/Delivery'
        trigger:
          $ref: '#/components/schemas/EventTrigger'
        scopes:
          type: array
          description: >
            Selects which publisher-defined scopes to subscribe to. Must match
            scope names defined on the corresponding EventExposure. Maps to
            EventSubscriptionSpec.Scopes in the EventSubscription CR.
          items:
            type: string
          example:
            - high-priority
    EventSubscriptionResponse:
      type: object
      readOnly: true
      allOf:
        - $ref: '#/components/schemas/EventSubscription'
        - properties:
            name:
              type: string
              readOnly: true
              example: de-telekom-eni-quickstart-v1
            zone:
              type: string
              readOnly: true
              description: >
                The zone where this subscription is placed. Maps to
                EventSubscriptionSpec.Zone in the EventSubscription CR.
            url:
              type: string
              readOnly: true
              description: >
                SSE endpoint URL for this subscription. Set when delivery type
                is ServerSentEvent. Maps to EventSubscriptionStatus.URL.
              example: >-
                https://stargate-playground.live.dhei.telekom.de/sse/eni/quickstart/v1
            subscriptionId:
              type: string
              readOnly: true
              description: >
                Unique identifier of the subscriber. Set when delivery type is
                ServerSentEvent. Maps to EventSubscriptionStatus.SubscriptionId.
            status:
              $ref: '#/components/schemas/Status'
            application:
              $ref: '#/components/schemas/ApplicationRef'
            team:
              $ref: '#/components/schemas/TeamRef'
            approval:
              $ref: '#/components/schemas/EventSubscriptionApproval'
    EventSubscriptionListResponse:
      properties:
        paging:
          $ref: '#/components/schemas/Paging'
        _links:
          $ref: '#/components/schemas/Links'
        items:
          type: array
          items:
            $ref: '#/components/schemas/EventSubscriptionResponse'
