openapi: 3.0.3
info:
  title: Common Schemas
  description: >
    # Shared schemas, parameters, headers, responses and security schemes used
    by the Application, Stargate and Event APIs.


    ## Convention


    ### ResourceId or *Id

    This is a unique identifier for a resource, which is generated by the system
    when the resource is created. 

    It is human-readable and often used in API paths to identify a specific
    resource.

    Example: `eni--hyperion--echo-app` for an application,
    `eni--hyperion--de-telekom-eni-quickstart-v1` for an EventType.

    Format: `{hub|group}--{team}--{resourceName}` for resources that are scoped
    to a team, `{resourceName}` for global resources.


    ### ResourceName or *Name

    This is a name for a resource, which is provided by the user when creating
    the resource. It is human-readable and often used in the request body when
    creating or updating a resource.

    It is not necessarily unique across the system, but must be unique within
    the scope of the resource (e.g., within a team for team-scoped resources).

    Example: `echo-app` for an application, `de-telekom-eni-quickstart-v1` for
    an EventType.
  version: 2.0.0
servers:
  - url: 'https://api.telekom.de/application/v2'
security:
  - OAuth2:
      - 'tardis:admin:all'
tags:
  - name: Application
    description: Manage applications
  - name: ApiExposure
    description: |
      With an ApiExposure you can define and API you want to expose on TARDIS,
      to provide it to other consumers. It is only possible to expose the entire
      API. It is not possible to expose a single resource. Therefore, every
      exposure needs the API Base Path which you can find in the Open API
      Specification File of your API and the upstream URL.
  - name: ApiSubscription
    description: |
      After an API is successful subscribed, you are able to use the API. It is
      only possible to subscribe to the entire API. It is not possible to
      subscribe only to a single resource
  - name: EventType
    description: |
      An EventType is a registry entry representing a known event type. It
      serves as the canonical reference that both EventExposures and
      EventSubscriptions point to. EventTypes are identified by a dot-separated
      identifier (e.g. "de.telekom.eni.quickstart.v1").
  - name: EventExposure
    description: |
      With an EventExposure you declare that your application publishes events
      of a specific type. This makes the events available for subscription by
      other applications. Each exposure is scoped to a zone and can define
      visibility, approval strategy, and publisher-side scopes with filtering.
  - name: EventSubscription
    description: |
      An EventSubscription declares that your application wants to receive
      events of a specific type. You can configure the delivery mechanism
      (callback or server-sent events), payload format, and subscriber-side
      filtering criteria.
