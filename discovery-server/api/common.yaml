openapi: 3.0.3
info:
  title: Common Schemas
  description: |
    # Shared schemas, parameters, headers, responses and security schemes used by the Application, Stargate and Event APIs.

    ## Convention

    ### ResourceId or *Id
    This is a unique identifier for a resource, which is generated by the system when the resource is created. 
    It is human-readable and often used in API paths to identify a specific resource.
    Example: `eni--hyperion--echo-app` for an application, `eni--hyperion--de-telekom-eni-quickstart-v1` for an EventType.
    Format: `{hub|group}--{team}--{resourceName}` for resources that are scoped to a team, `{resourceName}` for global resources.

    ### ResourceName or *Name
    This is a name for a resource, which is provided by the user when creating the resource. It is human-readable and often used in the request body when creating or updating a resource.
    It is not necessarily unique across the system, but must be unique within the scope of the resource (e.g., within a team for team-scoped resources).
    Example: `echo-app` for an application, `de-telekom-eni-quickstart-v1` for an EventType.

  version: 2.0.0
paths: {}
components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth2 client_credentials flow
      flows:
        clientCredentials:
          tokenUrl: https://example.com/auth/realms/realm/protocol/openid-connect/token
          scopes:
            tardis:admin:all: Admin access to all resources
            tardis:admin:read: Admin read access to all resources
            tardis:admin:obfuscated: Admin obfuscated access to all resources
            tardis:supervisor:read: (deprecated) Admin obfuscated access to all resources
            tardis:hub:all: Access to all resources of a hub
            tardis:hub:read: Read access to all resources of a hub
            tardis:hub:obfuscated: Obfuscated access to all resources of a hub
            tardis:team:all: Access to all resources of a team
            tardis:team:read: Read access to all resources of a team
            tardis:team:obfuscated: Obfuscated access to all resources of a team
            tardis:user:all: (deprecated) Access to all resources of a team
            tardis:user:read: (deprecated) Read access to all resources of a team
            tardis:user:obfuscated: (deprecated) Obfuscated access to all resources of a team
  parameters:
    Offset:
      name: offset
      in: query
      description: 0-based number of the first returned object in the found list
      required: false
      schema:
        type: integer
        format: int32
        minimum: 0
        default: 0
    Limit:
      name: limit
      description: >-
        page size requested by the consumer; must not be larger than the maximal
        page size
      in: query
      required: false
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 20
        default: 20
    Sort:
      name: sort
      in: query
      description: list of fields to be used for sorting. Default is name
      required: false
      schema:
        type: string
        enum:
          - name
    ApplicationId:
      name: applicationId
      in: path
      description: Unique resource id of this application
      required: true
      schema:
        type: string
  headers:
    XTotalCount:
      description: Total number of items matching criteria.
      schema:
        type: integer
        minimum: 0
    XResultCount:
      description: Actual number of items returned in the response body for this page.
      schema:
        type: integer
        minimum: 0
  responses:
    BadRequest:
      description: BAD_REQUEST
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: UNAUTHORIZED
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: FORBIDDEN
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: NOT_FOUND
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    UnsupportedMediaType:
      description: UNSUPPORTED_MEDIATYPE
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: SERVER_ERROR
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Error'
  schemas:
    Error:
      description: RFC-7807 conform object sent on any error
      type: object
      required:
        - type
        - title
      properties:
        type:
          type: string
        title:
          type: string
        status:
          type: number
        detail:
          type: string
        instance:
          type: string
        errorCode:
          type: string
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FieldProblem'
    FieldProblem:
      type: object
      required:
        - title
      properties:
        title:
          type: string
        detail:
          type: string
        path:
          type: string
    Paging:
      description: Pagination information
      type: object
      properties:
        total:
          description: total number of result objects matching the search parameters
          type: integer
          minimum: 0
        page:
          description: number of the current page, based on the requested limit value
          type: integer
          minimum: 1
        last_page:
          description: number of the last page, based on the requested limit value
          type: integer
          minimum: 1
      required:
        - total
        - page
        - last_page
    Links:
      description: HATEOAS links for pagination
      type: object
      required:
        - first
        - self
        - last
      properties:
        first:
          type: string
          format: uri
          description: the URI of the first page for requested pagination
        self:
          type: string
          format: uri
          description: the URI for the current page for requested pagination
        last:
          type: string
          format: uri
          description: >-
            the URI for the last page for requested pagination, based on the
            requested limit value
        prev:
          type: string
          format: uri
          description: >-
            the URI for the previous page for requested pagination, based on the
            requested limit value
        next:
          type: string
          format: uri
          description: >-
            the URI for the next page for requested pagination, based on the
            requested limit value
    StateInfo:
      type: object
      properties:
        message:
          type: string
        cause:
          type: string
    Status:
      type: object
      readOnly: true
      properties:
        state:
          $ref: '#/components/schemas/State'
        processingState:
          $ref: '#/components/schemas/ProcessingState'
        time:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/StateInfo'
        warnings:
          type: array
          items:
            $ref: '#/components/schemas/StateInfo'
        infos:
          type: array
          items:
            $ref: '#/components/schemas/StateInfo'
    State:
      enum:
        - none
        - invalid
        - blocked
        - complete
      type: string
      description: Current state of this resource
      example: complete
    ProcessingState:
      enum:
        - none
        - pending
        - processing
        - failed
        - done
      type: string
      description: Current processing state of this resource
      example: pending
    StatusTimestamps:
      type: object
      properties:
        createdAt:
          description: Timestamp when this resource was created.
          type: string
          format: date-time
        processedAt:
          description: Timestamp when this resource was last processed.
          type: string
          format: date-time
    Problem:
      type: object
      properties:
        resource:
          $ref: '#/components/schemas/ResourceRef'
        context:
          type: string
        message:
          type: string
        cause:
          type: string
        details:
          type: string
    ResourceRef:
      type: object
      readOnly: true
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        name:
          type: string
        namespace:
          type: string
        path:
          type: string
    TeamRef:
      type: object
      readOnly: true
      required:
        - hub
        - name
      properties:
        hub:
          type: string
          description: 'allowed characters: [a-z],[0-9],[-]'
          pattern: '[a-z0-9-]+'
          example: eni
        name:
          type: string
          description: 'allowed characters: [a-z],[0-9],[-]'
          pattern: '[a-z0-9-]+'
          example: hyperion
        email:
          type: string
          readOnly: true
          description: contact email address of the team
          format: email
    ApplicationRef:
      type: object
      readOnly: true
      required:
        - name
      properties:
        name:
          type: string
          example: echo-app
        icto:
          type: string
          example: icto-12345
    ResourceStatusResponse:
      description: >-
        Response resource which contains information about the status of the
        resource and all its relevant sub-resources
      readOnly: true
      required:
        - state
        - processingState
        - overallStatus
      type: object
      allOf:
        - $ref: '#/components/schemas/StatusTimestamps'
        - properties:
            state:
              $ref: '#/components/schemas/State'
            processingState:
              $ref: '#/components/schemas/ProcessingState'
            overallStatus:
              description: Status of this resource and all its relevant sub-resources
              type: string
              example: blocked
            errors:
              description: List of errors that resulted while processing this resource
              type: array
              items:
                $ref: '#/components/schemas/Problem'
            warnings:
              description: List of warnings that resulted while processing this resource
              type: array
              items:
                $ref: '#/components/schemas/Problem'
            infos:
              description: List of infos that resulted while processing this resource
              type: array
              items:
                $ref: '#/components/schemas/Problem'
