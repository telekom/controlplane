# Default overlay for production/release installations.
# Pulls controller configs from GitHub at a pinned release tag.
#
# Usage:
#   kubectl apply -k install/overlays/default
#   # or via ArgoCD pointing at this directory

resources:
  - ../../base
  - https://github.com/telekom/controlplane//approval/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//secret-manager/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//rover/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//identity/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//gateway/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//application/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//organization/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//api/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//admin/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//rover-server/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//file-manager/config/default/?timeout=120&ref=v0.18.0
  - https://github.com/telekom/controlplane//notification/config/default/?timeout=120&ref=v0.18.0

# Uncomment to enable optional components:
# components:
#   - ../../components/eventing
#   - ../../components/database

# Uncomment to enable the controlplane-api and projector:
#  - https://github.com/telekom/controlplane//controlplane-api/config/default/?timeout=120&ref=v0.18.0
#  - https://github.com/telekom/controlplane//projector/config/default/?timeout=120&ref=v0.18.0

images:
  - name: ghcr.io/telekom/controlplane/approval
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/gateway
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/identity
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/secret-manager
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/file-manager
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/rover
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/application
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/api
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/organization
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/admin
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/rover-server
    newTag: v0.18.0
  - name: ghcr.io/telekom/controlplane/notification
    newTag: v0.18.0
  # Uncomment if eventing component is enabled:
  # - name: ghcr.io/telekom/controlplane/event
  #   newTag: v0.18.0
  # - name: ghcr.io/telekom/controlplane/pubsub
  #   newTag: v0.18.0
  # Uncomment if controlplane-api and projector are enabled:
  # - name: ghcr.io/telekom/controlplane/controlplane-api
  #   newTag: v0.18.0
  # - name: ghcr.io/telekom/controlplane/projector
  #   newTag: v0.18.0
