database:
  url: ${DATABASE_URL}

graphql:
  playgroundEnabled: true

log:
  level: debug

# Local dev: single external listener, mock auth (no issuers required), plain
# HTTP (no tls block). Set mode: jwt + trustedIssuers for a real deployment.
listeners:
  external:
    address: ":8443"
    jwt:
      mode: mock
