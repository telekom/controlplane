apiVersion: event.cp.ei.telekom.de/v1
kind: EventConfig
metadata:
  name: controlplane
  namespace: controlplane--dataplane1
  labels:
    app.kubernetes.io/name: event
    app.kubernetes.io/managed-by: kustomize
    cp.ei.telekom.de/environment: controlplane
spec:
  # Zone reference — must match an existing Zone CR (1:1 relationship).
  zone:
    name: dataplane1
    namespace: controlplane

  # Admin backend (quasar configuration API).
  admin:
    url: https://my-quasar-admin.example.com/

  # Used as the upstream for the SSE gateway Route created by EventExposure.
  serverSendEventUrl: "https://my-tasse.example.com/v1/poc/events"

  # Used as the upstream for the publish gateway Route.
  publishEventUrl: "https://my-producer.example.com/v1/poc/events"
 
  voyagerApiUrl: https://my-voyager-api.example.com/

  ## --- Optional fields (shown below with explicit values for reference) ---
  ## All fields below are auto-resolved if omitted:
  ##
  ## mesh:
  ##   fullMesh: true                         # defaults to true
  ##   client:
  ##     realm:                               # defaults to zone's default identity realm
  ##       name: controlplane
  ##       namespace: controlplane--dataplane1
  ##
  ## admin.client:
  ##   clientId: admin--controlplane-client    # auto-generated
  ##   clientSecret: ...                       # auto-generated
  ##   realm:                                  # defaults to zone's internal identity realm
  ##     name: rover
  ##     namespace: controlplane--dataplane1
