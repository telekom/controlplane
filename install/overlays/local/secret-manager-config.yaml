backend:
  type: kubernetes

# Auth: uses the default internal k8s listener (:8443, audience secret-manager,
# in-cluster issuer, empty accessConfig = any authenticated in-cluster SA).
# To restrict access, add an accessConfig allow-list, e.g.:
#
# listeners:
#   internal:
#     address: ":8443"
#     k8s:
#       audience: secret-manager
#       accessConfig:
#         - service_account_name: identity-controller-manager
#           namespace: identity-system
#           allowed_access:
#             - secrets_read
#         - service_account_name: organization-controller-manager
#           namespace: organization-system
#           allowed_access:
#             - onboarding_write
#             - secrets_write
#             - secrets_read
#         - service_account_name: rover-controller-manager
#           namespace: rover-system
#           allowed_access:
#             - onboarding_write
#             - secrets_write
#             - secrets_read
