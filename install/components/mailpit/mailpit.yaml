apiVersion: v1
kind: Service
metadata:
  name: mailpit
  namespace: system
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/component: mail
spec:
  ports:
    - name: smtp
      port: 1025
      targetPort: 1025
    - name: http
      port: 8025
      targetPort: 8025
  selector:
    app.kubernetes.io/component: mail
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailpit
  namespace: system
  labels:
    app.kubernetes.io/name: mailpit
    app.kubernetes.io/component: mail
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: mail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailpit
        app.kubernetes.io/component: mail
    spec:
      containers:
        - name: mailpit
          image: axllent/mailpit:latest
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /livez
              port: 8025
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8025
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            limits:
              cpu: 200m
              memory: 128Mi
            requests:
              cpu: 50m
              memory: 64Mi
