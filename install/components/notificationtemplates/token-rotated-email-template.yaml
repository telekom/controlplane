apiVersion: notification.cp.ei.telekom.de/v1
kind: NotificationTemplate
metadata:
  labels:
    cp.ei.telekom.de/environment: env
  name: token-rotated--mail
  namespace: env
spec:
  purpose: token-rotated
  channelType: Email
  subjectTemplate: "Team token updated for team {{.team}} on environment {{.environment}}"
  template: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Team Token Updated - Control Plane</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                color: #333;
                background-color: #f9f9f9;
                line-height: 1.6;
            }

            .content {
                max-width: 700px;
                margin: auto;
                background-color: #fff;
                padding: 20px;
                border-top: 10px solid #e20074;
                border-bottom: 10px solid #e20074;
            }

            h1, h2 {
                margin: 0 0 10px;
            }

            h2 span.highlight {
                font-style: italic;
                color: #e20074;
            }

            .header-table td {
                vertical-align: middle;
            }

            a {
                color: #e20074;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
    <div class="content">
        <table class="header-table" width="100%">
            <tr>
                <td width="120" style="text-align: center;">
                    <img width="120" height="120" src="https://raw.githubusercontent.com/telekom/controlplane/main/docs/static/img/eni-tardis-small.png" alt="TARDIS Logo">
                </td>
                <td>
                    <div style="margin-left: 24px;">
                        <h2 style="color:#e20074; margin:0 0 4px;">Control Plane</h2>
                        <h1 style="margin:0;">Team Token Updated</h1>
                    </div>
                </td>
            </tr>
        </table>

        <!-- Summary box -->
        <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse; margin:20px 0; border-left:4px solid #e20074; background:#fdf0f5;">
            <tr>
                <td style="padding:12px 16px;">
                    <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse;">
                        <tr>
                            <td style="padding:4px 0;"><strong>Environment:</strong> {{.environment}}</td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

        <p>Hello team {{.team}},</p>

        <p>
            Your team token has been updated. Please ensure that all pipelines and integrations using the previous token are updated with the new one.
        </p>

        <p>
            You can find your team token in the <strong>Control Plane Portal</strong>.
        </p>

        <p>
            Refer to your platform documentation for token usage guidance.
        </p>

        <!-- Footer -->
        <hr style="border:none; border-top:1px solid #ddd; margin:24px 0;">
        <p style="margin:0;">Best regards,<br><strong>Control Plane Team</strong></p>
        <p style="color:#999; font-size:12px; margin-top:12px;">This is an automated notification. Please do not reply to this email.</p>
    </div>
    </body>
    </html>
