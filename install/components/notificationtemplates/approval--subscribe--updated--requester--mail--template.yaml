apiVersion: notification.cp.ei.telekom.de/v1
kind: NotificationTemplate
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
  name:  approval--subscribe--updated--requester--mail
spec:
  purpose:  approval--subscribe--updated--requester
  channelType: Email
  subjectTemplate: "[{{.environment}}][Approval] Updated subscription to {{.resource_type}} {{.resource_name}} from team {{.decider_team}}({{.decider_group}})"
  template: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Subscription Update - Control Plane</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                color: #333;
                background-color: #f9f9f9;
                line-height: 1.6;
            }

            .content {
                max-width: 700px;
                margin: auto;
                background-color: #fff;
                padding: 20px;
                border-top: 10px solid #e20074;
                border-bottom: 10px solid #e20074;
            }

            h1, h2 {
                margin: 0 0 10px;
            }

            h2 span.highlight {
                font-style: italic;
                color: #e20074;
            }

            .header-table td {
                vertical-align: middle;
            }

            a {
                color: #e20074;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
    <div class="content">
        <table class="header-table" width="100%">
            <tr>
                <td width="120" style="text-align: center;">
                    <img width="120" height="120" src="https://raw.githubusercontent.com/telekom/controlplane/main/docs/static/img/eni-tardis-small.png" alt="TARDIS Logo">
                </td>
                <td>
                    <div style="margin-left: 24px;">
                        <h2 style="color:#e20074; margin:0 0 4px;">Control Plane</h2>
                        <h1 style="margin:0;">Subscription Update</h1>
                    </div>
                </td>
            </tr>
        </table>

        <!-- Summary box -->
        <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse; margin:20px 0; border-left:4px solid #e20074; background:#fdf0f5;">
            <tr>
                <td style="padding:12px 16px;">
                    <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse;">
                        <tr>
                            <td style="padding:4px 0;"><strong>Environment:</strong> {{.environment}}</td>
                        </tr>
                        <tr>
                            <td style="padding:4px 0;"><strong>Resource:</strong> {{.resource_type}} <span style="color:#e20074; font-weight:bold;">{{.resource_name}}</span></td>
                        </tr>
                        <tr>
                            <td style="padding:4px 0;"><strong>Status:</strong> {{.state_old}} &rarr; {{.state_new}}</td>
                        </tr>
                        {{if eq .resource_type "API"}}<tr>
                            <td style="padding:4px 0;"><strong>OAuth Scopes:</strong> {{.scopes}}</td>
                        </tr>{{end}}
                    </table>
                </td>
            </tr>
        </table>

        <p>Hello team {{.requester_team}},</p>

        <p>
            The state of your {{.resource_type}} subscription to <strong>{{.resource_name}}</strong> that is exposed by application <strong>{{.decider_application}}</strong> has changed.
        </p>

        <p>
            The state changed from <strong>{{.state_old}}</strong> to <strong>{{.state_new}}</strong>.
        </p>

        <!-- Exposure details table -->
        <h3>Exposure Details</h3>
        <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse; margin:8px 0 16px;">
            <tr style="background:#f5f5f5;">
                <td style="padding:8px 12px; font-weight:bold; width:140px; border-bottom:1px solid #eee;">Resource</td>
                <td style="padding:8px 12px; border-bottom:1px solid #eee;">{{.resource_name}}</td>
            </tr>
            <tr>
                <td style="padding:8px 12px; font-weight:bold; border-bottom:1px solid #eee;">Application</td>
                <td style="padding:8px 12px; border-bottom:1px solid #eee;">{{.decider_application}}</td>
            </tr>
            <tr style="background:#f5f5f5;">
                <td style="padding:8px 12px; font-weight:bold; border-bottom:1px solid #eee;">Team</td>
                <td style="padding:8px 12px; border-bottom:1px solid #eee;">{{.decider_team}}</td>
            </tr>
            <tr>
                <td style="padding:8px 12px; font-weight:bold;">Group</td>
                <td style="padding:8px 12px;">{{.decider_group}}</td>
            </tr>
        </table>

        <p>You can manage the subscription via your platform portal.</p>

        <!-- Footer -->
        <hr style="border:none; border-top:1px solid #ddd; margin:24px 0;">
        <p style="margin:0;">Best regards,<br><strong>Control Plane Team</strong></p>
        <p style="color:#999; font-size:12px; margin-top:12px;">This is an automated notification. Please do not reply to this email.</p>
    </div>
    </body>
    </html>
