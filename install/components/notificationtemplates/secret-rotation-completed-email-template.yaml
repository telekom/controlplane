apiVersion: notification.cp.ei.telekom.de/v1
kind: NotificationTemplate
metadata:
  labels:
    app.kubernetes.io/managed-by: kustomize
  name: secret-rotation-completed--mail
spec:
  purpose: secret-rotation-completed
  channelType: Email
  subjectTemplate: "[{{.environment}}] Secret rotated for application {{.application}}"
  template: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Secret Rotation Completed - Control Plane</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                color: #333;
                background-color: #f9f9f9;
                line-height: 1.6;
            }

            .content {
                max-width: 700px;
                margin: auto;
                background-color: #fff;
                padding: 20px;
                border-top: 10px solid #e20074;
                border-bottom: 10px solid #e20074;
            }

            h1, h2 {
                margin: 0 0 10px;
            }

            h2 span.highlight {
                font-style: italic;
                color: #e20074;
            }

            .header-table td {
                vertical-align: middle;
            }

            a {
                color: #e20074;
                text-decoration: none;
            }

            a:hover {
                text-decoration: underline;
            }
        </style>
    </head>
    <body>
    <div class="content">
        <table class="header-table" width="100%">
            <tr>
                <td width="120" style="text-align: center;">
                    <img width="120" height="120" src="https://raw.githubusercontent.com/telekom/controlplane/main/docs/static/img/eni-tardis-small.png" alt="TARDIS Logo">
                </td>
                <td>
                    <div style="margin-left: 24px;">
                        <h2 style="color:#e20074; margin:0 0 4px;">Control Plane</h2>
                        <h1 style="margin:0;">Secret Rotation Completed</h1>
                    </div>
                </td>
            </tr>
        </table>

        <!-- Summary box -->
        <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse; margin:20px 0; border-left:4px solid #e20074; background:#fdf0f5;">
            <tr>
                <td style="padding:12px 16px;">
                    <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse;">
                        <tr>
                            <td style="padding:4px 0;"><strong>Application:</strong> {{.application}}</td>
                        </tr>
                        <tr>
                            <td style="padding:4px 0;"><strong>Environment:</strong> {{.environment}}</td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>

        <p>Hello team {{.team}},</p>

        <p>
            The client secret for your application <strong>{{.application}}</strong> has been successfully rotated.
        </p>

        <p>
            A grace period is now active. During this time, both the old and the new secret are valid.
            Please update all consumers to use the new secret before the grace period ends.
        </p>

        <!-- Details box -->
        <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse; margin:16px 0; border:1px solid #ddd; border-radius:4px;">
            <tr>
                <td style="padding:12px 16px; background:#f5f5f5;">
                    <table cellpadding="0" cellspacing="0" style="width:100%; border-collapse:collapse;">
                        {{if .currentExpiresAt}}
                        <tr>
                            <td style="padding:4px 0;"><strong>New secret expires at:</strong> {{.currentExpiresAt}}</td>
                        </tr>
                        {{end}}
                        {{if .rotatedExpiresAt}}
                        <tr>
                            <td style="padding:4px 0;"><strong>Old secret valid until:</strong> {{.rotatedExpiresAt}}</td>
                        </tr>
                        {{end}}
                    </table>
                </td>
            </tr>
        </table>

        <p>
            You can retrieve the new secret from the <strong>Control Plane Portal</strong> under your application settings.
        </p>

        <!-- Footer -->
        <hr style="border:none; border-top:1px solid #ddd; margin:24px 0;">
        <p style="margin:0;">Best regards,<br><strong>Control Plane Team</strong></p>
        <p style="color:#999; font-size:12px; margin-top:12px;">This is an automated notification. Please do not reply to this email.</p>
    </div>
    </body>
    </html>
  attachments:
    - filename: "grace-period-deadline.ics"
      contentType: "text/calendar; charset=utf-8"
      template: |
        BEGIN:VCALENDAR
        VERSION:2.0
        PRODID:-//Control Plane//Secret Rotation//EN
        METHOD:PUBLISH
        BEGIN:VEVENT
        DTSTART:{{ icsTime .rotatedExpiresAt }}
        DTEND:{{ icsTime .rotatedExpiresAt }}
        SUMMARY:[{{ .environment }}] Grace period ends for {{ .application }}
        DESCRIPTION:The old secret for application {{ .application }} stops being valid at {{ .rotatedExpiresAt }}. Ensure all consumers have been updated to use the new secret before this deadline.
        BEGIN:VALARM
        TRIGGER:-PT30M
        ACTION:DISPLAY
        DESCRIPTION:Old secret for {{ .application }} expires in 30 minutes
        END:VALARM
        END:VEVENT
        END:VCALENDAR
