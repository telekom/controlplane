# Kustomize Component that adds the eventing subsystem (event + pubsub controllers).
# This is an optional feature that can be composed into any overlay.
#
# The event controller is the high-level orchestrator that translates user-facing
# event resources (EventConfig, EventType, EventExposure, EventSubscription) into
# lower-level pubsub resources (EventStore, Publisher, Subscriber).
#
# Both controllers are always deployed together.

apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - ../../../event/config/default
  - ../../../pubsub/config/default
