---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - spectre.cp.ei.telekom.de
  resources:
  - listeners
  - spectreapplications
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - spectre.cp.ei.telekom.de
  resources:
  - listeners/finalizers
  - spectreapplications/finalizers
  verbs:
  - update
- apiGroups:
  - spectre.cp.ei.telekom.de
  resources:
  - listeners/status
  - spectreapplications/status
  verbs:
  - get
  - patch
  - update
