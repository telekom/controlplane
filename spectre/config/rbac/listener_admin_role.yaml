# This rule is not used by the project spectre itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants full permissions ('*') over spectre.ei.telekom.de.cp.ei.telekom.de.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: spectre
    app.kubernetes.io/managed-by: kustomize
  name: listener-admin-role
rules:
- apiGroups:
  - spectre.ei.telekom.de.cp.ei.telekom.de
  resources:
  - listeners
  verbs:
  - '*'
- apiGroups:
  - spectre.ei.telekom.de.cp.ei.telekom.de
  resources:
  - listeners/status
  verbs:
  - get
