# This rule is not used by the project spectre itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to spectre.ei.telekom.de.cp.ei.telekom.de resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: spectre
    app.kubernetes.io/managed-by: kustomize
  name: listener-viewer-role
rules:
- apiGroups:
  - spectre.ei.telekom.de.cp.ei.telekom.de
  resources:
  - listeners
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - spectre.ei.telekom.de.cp.ei.telekom.de
  resources:
  - listeners/status
  verbs:
  - get
