# This rule is not used by the project spectre itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the spectre.cp.ei.telekom.de.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: spectre
    app.kubernetes.io/managed-by: kustomize
  name: listener-editor-role
rules:
- apiGroups:
  - spectre.cp.ei.telekom.de
  resources:
  - listeners
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - spectre.cp.ei.telekom.de
  resources:
  - listeners/status
  verbs:
  - get
