namespace: controlplane-system

namePrefix: file-

labels:
- includeSelectors: true
  pairs:
    domain: file

resources:
- ../crd
- ../rbac
- ../manager

patches:
- path: deployment_patch.yaml
  target:
    kind: Deployment
- path: namespace_patch.yaml
  target:
    kind: Namespace
