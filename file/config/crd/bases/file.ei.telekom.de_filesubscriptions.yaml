---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: filesubscriptions.file.ei.telekom.de
spec:
  group: file.ei.telekom.de
  names:
    kind: FileSubscription
    listKind: FileSubscriptionList
    plural: filesubscriptions
    singular: filesubscription
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The file type identifier
      jsonPath: .spec.fileType
      name: FileType
      type: string
    - description: Creation timestamp
      jsonPath: .metadata.creationTimestamp
      name: CreatedAt
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FileSubscription is the Schema for the filesubscriptions API.
          It declares that an application consumes a file type.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: FileSubscriptionSpec defines the desired state of FileSubscription.
            properties:
              fileType:
                description: |-
                  FileType is the file type identifier this subscription belongs to.
                  References the FileType CR via MakeFileTypeName() conversion.
                minLength: 1
                type: string
              sftp:
                description: |-
                  Sftp holds the SFTP storage-backend-specific configuration for this subscription.
                  Backend-specific settings live under their own sub-object (e.g. sftp) so that
                  additional storage backends can be added without polluting the spec root.
                properties:
                  clientId:
                    description: ClientId identifies the consumer application's client
                      on the SFTP backend.
                    type: string
                  publicKeys:
                    description: PublicKeys are the SSH public keys registered for
                      the consumer's SFTP user.
                    items:
                      description: PublicKey is a labeled SSH public key registered
                        on the SFTP user.
                      properties:
                        key:
                          description: Key is the SSH public key value. It must be
                            unique per file type.
                          minLength: 1
                          type: string
                        label:
                          description: Label is a human-readable identifier for the
                            key. It must be unique per file type.
                          minLength: 1
                          type: string
                      required:
                      - key
                      - label
                      type: object
                    minItems: 1
                    type: array
                required:
                - publicKeys
                type: object
            required:
            - fileType
            - sftp
            type: object
          status:
            description: FileSubscriptionStatus defines the observed state of FileSubscription.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
