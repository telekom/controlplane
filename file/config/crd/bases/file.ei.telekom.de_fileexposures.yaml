---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: fileexposures.file.ei.telekom.de
spec:
  group: file.ei.telekom.de
  names:
    kind: FileExposure
    listKind: FileExposureList
    plural: fileexposures
    singular: fileexposure
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The file type identifier
      jsonPath: .spec.fileType
      name: FileType
      type: string
    - description: Whether this exposure is provisioned
      jsonPath: .status.active
      name: Active
      type: boolean
    - description: Creation timestamp
      jsonPath: .metadata.creationTimestamp
      name: CreatedAt
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FileExposure is the Schema for the fileexposures API.
          It declares that an application exposes a file type. The derived logical
          Application is created without an Identity client.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: ExposureSpec defines the desired state of a file Exposure.
            properties:
              approval:
                description: Approval configures how subscriptions to this file type
                  are approved.
                properties:
                  strategy:
                    default: Simple
                    description: Strategy defines the approval mode for subscriptions
                      to this file type.
                    enum:
                    - Auto
                    - Simple
                    - FourEyes
                    type: string
                  trustedTeams:
                    description: |-
                      TrustedTeams identifies teams that are trusted for approving subscriptions
                      to this file type. Per default your own team is trusted.
                    items:
                      type: string
                    maxItems: 10
                    minItems: 0
                    type: array
                required:
                - strategy
                type: object
              fileType:
                description: |-
                  FileType is the file type identifier this exposure belongs to.
                  References the FileType CR via MakeFileTypeName() conversion.
                minLength: 1
                type: string
              sftp:
                description: |-
                  Sftp holds the SFTP storage-backend-specific configuration for this exposure.
                  Backend-specific settings live under their own sub-object (e.g. sftp) so that
                  additional storage backends can be added without polluting the spec root.
                properties:
                  publicKeys:
                    description: PublicKeys are the SSH public keys registered for
                      the provider's SFTP user.
                    items:
                      description: PublicKey is a labeled SSH public key registered
                        on the SFTP user.
                      properties:
                        key:
                          description: Key is the SSH public key value. It must be
                            unique per file type.
                          minLength: 1
                          type: string
                        label:
                          description: Label is a human-readable identifier for the
                            key. It must be unique per file type.
                          minLength: 1
                          type: string
                      required:
                      - key
                      - label
                      type: object
                    minItems: 1
                    type: array
                required:
                - publicKeys
                type: object
              visibility:
                default: Enterprise
                description: Visibility defines who can see and subscribe to this file
                  type.
                enum:
                - World
                - Zone
                - Enterprise
                type: string
              zone:
                description: |-
                  Zone references the Zone CR where this file type is exposed.
                  On this layer only the Zone ref is passed; the file domain resolves it to
                  the zone-scoped service configuration for the backend.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - approval
            - fileType
            - sftp
            - zone
            type: object
          status:
            description: ExposureStatus defines the observed state of a file Exposure.
            properties:
              active:
                description: Active indicates whether this exposure has been provisioned.
                type: boolean
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              subscriptions:
                description: Subscriptions references the file-domain FileSubscriptions
                  bound to this exposure.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    uid:
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
