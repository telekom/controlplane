---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: fileexposures.file.ei.telekom.de
spec:
  group: file.ei.telekom.de
  names:
    kind: FileExposure
    listKind: FileExposureList
    plural: fileexposures
    singular: fileexposure
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Whether this exposure is provisioned
      jsonPath: .status.active
      name: Active
      type: boolean
    - description: Creation timestamp
      jsonPath: .metadata.creationTimestamp
      name: CreatedAt
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FileExposure is the Schema for the fileexposures API.
          It declares that an application exposes a file type. The derived logical
          Application is created without an Identity client.
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: ExposureSpec defines the desired state of a file Exposure.
            properties:
              approval:
                default: Simple
                description: Approval configures how subscriptions to this file type
                  are approved.
                enum:
                - Auto
                - Simple
                - FourEyes
                type: string
              publicKeys:
                description: PublicKeys are the SSH public keys registered for the
                  provider's SFTP user.
                items:
                  description: PublicKey is a labeled SSH public key registered on
                    the SFTP user.
                  properties:
                    key:
                      description: Key is the SSH public key value. It must be unique
                        per file type.
                      minLength: 1
                      type: string
                    label:
                      description: Label is a human-readable identifier for the key.
                        It must be unique per file type.
                      minLength: 1
                      type: string
                  required:
                  - key
                  - label
                  type: object
                minItems: 1
                type: array
              fileTypeRef:
                description: |-
                  FileTypeRef references the file-domain FileType this exposure belongs to.
                  It must live in the same namespace as this FileExposure.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    type: string
                required:
                - name
                - namespace
                type: object
              visibility:
                default: Enterprise
                description: Visibility defines who can see and subscribe to this file
                  type.
                enum:
                - World
                - Zone
                - Enterprise
                type: string
              zoneServiceConfigRef:
                description: |-
                  ZoneServiceConfigRef references the zone-scoped service configuration
                  (provided by the SFTP/DDS domain) used to reach the backend for this exposure.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    type: string
                required:
                - name
                - namespace
                type: object
            required:
            - publicKeys
            - specRef
            type: object
          status:
            description: ExposureStatus defines the observed state of a file Exposure.
            properties:
              active:
                description: Active indicates whether this exposure has been provisioned.
                type: boolean
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              subscriptions:
                description: Subscriptions references the file-domain FileSubscriptions
                  bound to this exposure.
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    uid:
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
