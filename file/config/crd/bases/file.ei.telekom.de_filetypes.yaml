---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: filetypes.file.ei.telekom.de
spec:
  group: file.ei.telekom.de
  names:
    kind: FileType
    listKind: FileTypeList
    plural: filetypes
    singular: filetype
    shortNames:
    - ftype
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Whether this file spec is provisioned
      jsonPath: .status.active
      name: Active
      type: boolean
    - description: Creation timestamp
      jsonPath: .metadata.creationTimestamp
      name: CreatedAt
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          FileType is the Schema for the filetypes API.
          It represents a registered file type in the file domain, serving as the canonical
          reference that FileExposure and FileSubscription point to (mirrors event.EventType).
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            description: FileTypeSpec defines the desired state of FileType.
            properties:
              description:
                description: Description provides a human-readable summary of this
                  file type.
                type: string
              exposureRef:
                description: ExposureRef references the file-domain FileExposure created
                  for this file type (1:1).
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    type: string
                required:
                - name
                - namespace
                type: object
              subscriptionRefs:
                description: SubscriptionRefs references the file-domain FileSubscriptions
                  created for this file type (1:n).
                items:
                  properties:
                    name:
                      type: string
                    namespace:
                      type: string
                    uid:
                      type: string
                  required:
                  - name
                  - namespace
                  type: object
                type: array
            type: object
          status:
            description: FileTypeStatus defines the observed state of FileType.
            properties:
              active:
                description: Active indicates whether this FileType has been provisioned.
                type: boolean
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

