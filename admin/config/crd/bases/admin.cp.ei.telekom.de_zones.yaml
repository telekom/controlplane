apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: zones.admin.cp.ei.telekom.de
spec:
  group: admin.cp.ei.telekom.de
  names:
    kind: Zone
    listKind: ZoneList
    plural: zones
    singular: zone
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Zone is the Schema for the zones API
          Group is the Schema for the groups API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ZoneSpec defines the desired state of Zone
            properties:
              aiGateway:
                description: |-
                  AiGateway configures a dedicated AI Gateway for this zone.
                  When present, the zone supports MCP exposures routed through a separate gateway
                  with streaming support (buffering disabled).
                properties:
                  admin:
                    description: Admin contains the admin credentials for the AI Gateway.
                    properties:
                      clientId:
                        description: |-
                          ClientId of the admin client.
                          If empty, a managed client with the default name will be used.
                        type: string
                      clientSecret:
                        description: |-
                          ClientSecret of the admin client
                          If empty, a managed client secret will be generated.
                        type: string
                      url:
                        description: URL of the gateway admin API.
                        format: uri
                        type: string
                    required:
                    - url
                    type: object
                  presets:
                    description: |-
                      Presets defines a list of gateway configuration presets for the AI Gateway.
                      Same structure as the regular gateway presets, allowing feature-based preset selection.
                    items:
                      properties:
                        default:
                          default: false
                          description: |-
                            Default indicates whether this preset is the default preset for the zone.
                            If true, this preset will be used if no other preset is explicitly selected.
                            There must be at least one preset with Default=true in the gateway configuration, otherwise the operator will return an error.
                          type: boolean
                        features:
                          description: |-
                            Features is a list of features that are enabled on this Preset.
                            This can be used to enable certain features on the zone when this preset is applied.
                          items:
                            properties:
                              enabled:
                                type: boolean
                              name:
                                type: string
                            required:
                            - enabled
                            - name
                            type: object
                          type: array
                          x-kubernetes-list-map-keys:
                          - name
                          x-kubernetes-list-type: map
                        name:
                          description: Name of the preset. This is used to reference
                            the preset in the Zone spec.
                          pattern: ^[aA-zZ0-9]+(-?[aA-zZ0-9]+)*$
                          type: string
                        urls:
                          description: Urls defines a list of URLs (hostname + base
                            path) that should be exposed by the gateway for this zone.
                            At least one URL is required.
                          items:
                            description: UrlConfig defines the configuration for a
                              single URL (hostname + base path) exposed by the gateway
                              for this zone.
                            properties:
                              basePath:
                                description: |-
                                  BasePath is the base path part of the URL which will be the prefix of all routes exposed on this URL (e.g. "/v1").
                                  It is appended to the hostname to construct the full URL (e.g. "https://api.example.com/v1").
                                pattern: ^/.*$
                                type: string
                              hidden:
                                description: |-
                                  Hidden controls whether this URL should be hidden from the Links section in the Zone status.
                                  This can be used to hide internal-only URLs that should not be exposed to API consumers.
                                type: boolean
                              hostname:
                                description: Hostname is the hostname part of the
                                  URL (e.g. "api.example.com").
                                maxLength: 253
                                type: string
                                x-kubernetes-validations:
                                - message: hostname must be a valid DNS-1123 subdomain
                                  rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                              port:
                                description: Port is the port number of the URL (e.g.
                                  8000). If not set, the default port for the scheme
                                  is used (443 for https, 80 for http).
                                format: int32
                                maximum: 65535
                                minimum: 1
                                type: integer
                              scheme:
                                default: https
                                description: Scheme is the URL scheme (e.g. "http"
                                  or "https"). Defaults to "https" if not set.
                                enum:
                                - http
                                - https
                                type: string
                            required:
                            - basePath
                            - hidden
                            - hostname
                            type: object
                          maxItems: 5
                          minItems: 1
                          type: array
                      required:
                      - default
                      - name
                      - urls
                      type: object
                    maxItems: 5
                    minItems: 1
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                required:
                - admin
                - presets
                type: object
              externalIdPolicies:
                description: |-
                  ExternalIdPolicies configures, per identifier scheme, the format and
                  presence requirements for externalIds on Rovers and Applications bound to
                  this zone. Empty means no enforcement for any scheme.
                items:
                  description: |-
                    ExternalIdPolicy configures validation for a single external identifier scheme
                    on Rovers and Applications in this zone.
                  properties:
                    pattern:
                      description: |-
                        Pattern is the ECMA 262 regex the id must match. Always enforced when an
                        externalIds entry with this scheme is present; also drives the
                        presence-check error when Required is true.
                      minLength: 1
                      type: string
                    required:
                      default: false
                      description: |-
                        Required acts as a per-zone feature flag controlling whether this scheme
                        is mandatory in this zone. When true, every Rover/Application in this
                        zone MUST carry an externalIds entry with this scheme. The id's format
                        is always checked against Pattern whenever an entry with this scheme is
                        supplied, regardless of Required.
                      type: boolean
                    scheme:
                      description: Scheme names the identifier system (e.g. "psi",
                        "icto").
                      maxLength: 32
                      minLength: 1
                      pattern: ^[a-z][a-z0-9]*$
                      type: string
                  required:
                  - pattern
                  - required
                  - scheme
                  type: object
                maxItems: 16
                type: array
                x-kubernetes-list-map-keys:
                - scheme
                x-kubernetes-list-type: map
              gateway:
                properties:
                  admin:
                    description: |-
                      GatewayAdminConfig contains the necessary information to connect to the gateway admin API for this zone.
                      Most of it can be optional if the Gateway was setup to support it, then only the URL is required.
                    properties:
                      clientId:
                        description: |-
                          ClientId of the admin client.
                          If empty, a managed client with the default name will be used.
                        type: string
                      clientSecret:
                        description: |-
                          ClientSecret of the admin client
                          If empty, a managed client secret will be generated.
                        type: string
                      url:
                        description: URL of the gateway admin API.
                        format: uri
                        type: string
                    required:
                    - url
                    type: object
                  presets:
                    description: |-
                      Presets defines a list of gateway configuration presets that can be applied to this zone. At least one preset is required.
                      This allows to define different sets of features and URLs that can be selected for the zone based on the desired features.
                    items:
                      properties:
                        default:
                          default: false
                          description: |-
                            Default indicates whether this preset is the default preset for the zone.
                            If true, this preset will be used if no other preset is explicitly selected.
                            There must be at least one preset with Default=true in the gateway configuration, otherwise the operator will return an error.
                          type: boolean
                        features:
                          description: |-
                            Features is a list of features that are enabled on this Preset.
                            This can be used to enable certain features on the zone when this preset is applied.
                          items:
                            properties:
                              enabled:
                                type: boolean
                              name:
                                type: string
                            required:
                            - enabled
                            - name
                            type: object
                          type: array
                          x-kubernetes-list-map-keys:
                          - name
                          x-kubernetes-list-type: map
                        name:
