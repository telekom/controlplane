                                  8000). If not set, the default port for the scheme
                                  is used (443 for https, 80 for http).
                                format: int32
                                maximum: 65535
                                minimum: 1
                                type: integer
                              scheme:
                                default: https
                                description: Scheme is the URL scheme (e.g. "http"
                                  or "https"). Defaults to "https" if not set.
                                enum:
                                - http
                                - https
                                type: string
                            required:
                            - basePath
                            - hidden
                            - hostname
                            type: object
                          maxItems: 5
                          minItems: 1
                          type: array
                      required:
                      - default
                      - name
                      - urls
                      type: object
                    maxItems: 5
                    minItems: 1
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                required:
                - admin
                - presets
                type: object
              identityProvider:
                properties:
                  admin:
                    properties:
                      clientId:
                        description: ClientId is the client ID to authenticate with
                          the identity provider admin API.
                        type: string
                      password:
                        description: Password is the password to authenticate with
                          the identity provider admin API.
                        type: string
                      url:
                        description: |-
                          Url is the base URL of the identity provider admin API.
                          If empty, the operator will attempt to discover the URL based on the provided IdentityProvider Url.
                        format: uri
                        type: string
                      userName:
                        description: UserName is the username to authenticate with
                          the identity provider admin API.
                        type: string
                    required:
                    - clientId
                    - password
                    - userName
                    type: object
                  secretRotation:
                    description: |-
                      SecretRotation contains the config for rotating secrets related to the default identity provider realm of this zone.
                      If not set, secret rotation will be disabled.
                    properties:
                      enabled:
                        description: |-
                          Enabled controls whether secret rotation is enabled for this zone.
                           If false, secrets will not be rotated and the grace period and expiration period will be ignored.
                        type: boolean
                      expirationPeriod:
                        description: |-
                          ExpirationPeriod is the duration that the current secret is valid for.
                          Once this period has elapsed, the secret is considered expired and should be rotated.
                        type: string
                      gracePeriod:
                        description: |-
                          GracePeriod is the duration that a rotated secret is valid for.
                          This allows to have a smooth transition when rotating secrets, as the old secret is still valid for a certain period of time after rotation.
                        type: string
                      notificationThresholds:
                        description: |-
                          NotificationThresholds defines the schedule of reminder notifications before
                          secret expiry. Each entry triggers a notification when the remaining time-to-expiry
                          crosses that threshold. Only the tightest (smallest) matching threshold is evaluated
                          per reconciliation cycle to avoid spamming.

                          Example: [{before: "720h"}, {before: "168h", repeat: "24h"}]
                          → single reminder at 30 days, then daily reminders starting at 7 days.
                        items:
                          description: Threshold defines when a reminder should fire
                            relative to a deadline.
                          properties:
                            before:
                              description: |-
                                Before is how long before the deadline this reminder fires.
                                For example, "720h" means 30 days before the deadline.
                              type: string
                            repeat:
                              description: |-
                                Repeat optionally re-sends the reminder at this interval once the
                                "Before" window is entered. For example, Before=168h + Repeat=24h
                                sends a reminder at 7d, 6d, 5d, … , 1d before the deadline.
                                If omitted, the reminder fires exactly once for this threshold.
                              type: string
                          required:
                          - before
                          type: object
                        minItems: 1
                        type: array
                    required:
                    - enabled
                    - expirationPeriod
                    - gracePeriod
                    - notificationThresholds
                    type: object
                  url:
                    description: |-
                      Url is the base URL of the identity provider.
                      It is used to construct the issuer URLs for the gateway realms and to obtain tokens for the gateway admin API if TokenUrl is not set.
                    format: uri
                    type: string
                required:
                - admin
                - url
                type: object
              managedRoutes:
                description: |-
                  ManagedRoutesConfig defines the configuration for managed routes in a zone.
                  Managed routes are automatically created and managed by the system based on this configuration.
                properties:
                  routes:
                    description: |-
                      Routes is the list of routes to be created for this zone.
                      It may be used to create additional routes that are required for operating the zone
                    items:
                      properties:
                        name:
                          description: Name is the name of the created route. It must
                            be unique within the zone.
                          pattern: ^[a-z0-9]+(-?[a-z0-9]+)*$
                          type: string
                        path:
                          description: Path is the path of the route exposed on the
                            gateway.
                          pattern: ^/.*$
                          type: string
                        type:
                          description: 'Type selects the route behavior: TeamAPI (authenticated,
                            no ACL) or Proxy (passthrough reverse proxy).'
                          enum:
                          - TeamAPI
                          - Proxy
                          type: string
                        url:
                          description: Url is the upstream URL of the route.
                          format: uri
                          type: string
                      required:
                      - name
                      - path
                      - type
                      - url
                      type: object
                    type: array
                type: object
              permissions:
                description: Permissions configuration for permission service integration
                properties:
                  apiBasePath:
                    description: |-
                      ApiBasePath is the base path for the permission service API endpoint
                      Format: /eni/chevron/v2/permission
                      This will be appended to the gateway URL to build the full permissions URL
                    pattern: ^/.*
                    type: string
                  consoleUrl:
                    description: ConsoleUrl is the admin UI for the permission service
                      (optional)
                    format: uri
                    type: string
                required:
                - apiBasePath
                type: object
              redis:
                properties:
                  enableTLS:
                    description: EnableTLS controls whether TLS is used for the Redis
                      connection.
                    type: boolean
                  host:
                    description: Host is the Redis server hostname (e.g. "redis-master.svc.cluster.local").
                    type: string
                  password:
                    description: Password is a reference to the Redis password in
                      the secret manager.
                    type: string
                  port:
                    default: 6379
                    description: Port is the Redis server port.
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - host
                type: object
              visibility:
                description: Visibility controls what subscriptions are allowed from
                  and to this zone. It's also relevant for features like failover
                enum:
                - World
                - Enterprise
                type: string
            required:
            - gateway
            - identityProvider
            - visibility
            type: object
          status:
            description: ZoneStatus defines the observed state of Zone
            properties:
              aiGateway:
                description: AiGateway references the AI Gateway CR created for this
                  zone.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - name
                - namespace
                type: object
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              features:
                description: |-
                  Features is a list of features that are enabled or disabled for this zone.
                  This can be used to control the availability of certain features in the zone
                items:
                  properties:
                    enabled:
                      type: boolean
                    name:
                      type: string
                  required:
                  - enabled
                  - name
                  type: object
                type: array
                x-kubernetes-list-map-keys:
