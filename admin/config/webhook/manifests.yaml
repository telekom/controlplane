---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-admin-cp-ei-telekom-de-v1-zone
  failurePolicy: Fail
  name: mzone-v1.kb.io
  rules:
  - apiGroups:
    - admin.cp.ei.telekom.de
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - zones
  sideEffects: None
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-admin-cp-ei-telekom-de-v1-environment
  failurePolicy: Fail
  name: venvironment-v1.kb.io
  rules:
  - apiGroups:
    - admin.cp.ei.telekom.de
    apiVersions:
    - v1
    operations:
    - CREATE
    - UPDATE
    resources:
    - environments
  sideEffects: None