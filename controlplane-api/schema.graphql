# Hand-written types that ent/entgql cannot auto-generate.
# The ent-generated schema is in ent.graphql.

# Reduced team information for cross-tenant contexts.
type TeamInfo {
  id: ID!
  name: String!
  "Group name for display"
  groupName: String!
  email: String
}

type Upstream {
  url: String!
  weight: Int!
}

type ApprovalConfig {
  strategy: ApprovalStrategy!
  trustedTeams: [String!]!
}

type RequesterInfo {
  teamName: String!
  teamEmail: String!
  reason: String
  applicationName: String
}

type DeciderInfo {
  teamName: String!
  teamEmail: String
}

type Decision {
  name: String!
  email: String
  comment: String
  timestamp: String
  resultingState: ApprovalState
}

type AvailableTransition {
  action: ApprovalAction!
  toState: ApprovalState!
}

enum ApiExposureFeature {
  BASIC_AUTH
  CIRCUIT_BREAKER
  CUSTOM_SCOPES
  DYNAMIC_UPSTREAM
  EXTERNAL_IDP
  FAILOVER
  HEADER_TRANSFORMATION
  IP_RESTRICTION
  LAST_MILE_SECURITY
  LOAD_BALANCING
  PASSTHROUGH
  RATE_LIMIT
  ACCESS_CONTROL
}

enum ApprovalAction {
  ALLOW
  DENY
  SUSPEND
  RESUME
}

extend type Application {
  "Owning team (reduced view for cross-tenant safety)"
  ownerTeam: TeamInfo!
}

