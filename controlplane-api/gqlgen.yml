schema: "*.graphql"

exec:
  layout: follow-schema
  package: resolvers
  filename_template: "{name}.generated.go"
  dir: internal/resolvers

resolver:
  layout: follow-schema
  package: resolvers
  filename_template: "{name}.resolvers.go"
  dir: internal/resolvers

model:
  filename: internal/resolvers/model/models.generated.go
  package: model

autobind:
  - github.com/99designs/gqlgen/graphql/introspection
  - github.com/telekom/controlplane/controlplane-api/ent
  - github.com/telekom/controlplane/controlplane-api/ent/api
  - github.com/telekom/controlplane/controlplane-api/ent/team
  - github.com/telekom/controlplane/controlplane-api/ent/application
  - github.com/telekom/controlplane/controlplane-api/ent/apiexposure
  - github.com/telekom/controlplane/controlplane-api/ent/apisubscription
  - github.com/telekom/controlplane/controlplane-api/ent/eventexposure
  - github.com/telekom/controlplane/controlplane-api/ent/eventsubscription
  - github.com/telekom/controlplane/controlplane-api/ent/eventtype

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.IntID
  CreateTeamInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.CreateTeamInput
  UpdateTeamInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.UpdateTeamInput
  MemberInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.MemberInput
  DecisionInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.DecisionInput
  MutationError:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.MutationError
  CreateTeamPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.CreateTeamPayload
  UpdateTeamPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.UpdateTeamPayload
  AddTeamMemberPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.AddTeamMemberPayload
  RemoveTeamMemberPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.RemoveTeamMemberPayload
  RotateTeamTokenPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.RotateTeamTokenPayload
  RotateApplicationSecretPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.RotateApplicationSecretPayload
  DecideApprovalRequestPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.DecideApprovalRequestPayload
  DecideApprovalPayload:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.DecideApprovalPayload
  Node:
    model:
      - github.com/telekom/controlplane/controlplane-api/ent.Noder
  TeamInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.TeamInfo
  Upstream:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.Upstream
  ApprovalConfig:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.ApprovalConfig
  RequesterInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.RequesterInfo
  DeciderInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.DeciderInfo
  Decision:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.Decision
  AvailableTransition:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.AvailableTransition
  Application:
    fields:
      clientSecret:
        resolver: true
      rotatedClientSecret:
        resolver: true
  Team:
    fields:
      teamToken:
        resolver: true
  ApiExposureInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.ApiExposureInfo
  ApiSubscriptionInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.ApiSubscriptionInfo
  EventSubscriptionInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.EventSubscriptionInfo
  EventExposureInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/pkg/model.EventExposureInfo
