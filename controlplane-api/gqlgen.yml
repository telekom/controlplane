schema: "*.graphql"

exec:
  layout: follow-schema
  package: resolvers
  filename_template: "{name}.generated.go"
  dir: internal/resolvers

resolver:
  layout: follow-schema
  package: resolvers
  filename_template: "{name}.resolvers.go"
  dir: internal/resolvers

model:
  filename: internal/resolvers/model/models.generated.go
  package: model

autobind:
  - github.com/99designs/gqlgen/graphql/introspection
  - github.com/telekom/controlplane/controlplane-api/ent
  - github.com/telekom/controlplane/controlplane-api/ent/team
  - github.com/telekom/controlplane/controlplane-api/ent/application
  - github.com/telekom/controlplane/controlplane-api/ent/apiexposure
  - github.com/telekom/controlplane/controlplane-api/ent/apisubscription

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.IntID
  TeamMutationResult:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.TeamMutationResult
  CreateTeamInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.CreateTeamInput
  UpdateTeamInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.UpdateTeamInput
  MemberInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.MemberInput
  TeamCategoryInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.TeamCategoryInput
  RotateTeamTokenInput:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.RotateTeamTokenInput
  Node:
    model:
      - github.com/telekom/controlplane/controlplane-api/ent.Noder
  TeamInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.TeamInfo
  Upstream:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.Upstream
  ApprovalConfig:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.ApprovalConfig
  RequesterInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.RequesterInfo
  DeciderInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.DeciderInfo
  Decision:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.Decision
  AvailableTransition:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.AvailableTransition
  ApiExposureInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.ApiExposureInfo
  ApiSubscriptionInfo:
    model:
      - github.com/telekom/controlplane/controlplane-api/internal/resolvers/model.ApiSubscriptionInfo
