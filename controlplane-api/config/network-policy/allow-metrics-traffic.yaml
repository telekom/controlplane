apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: controlplane-api-allow-metrics-traffic
  namespace: system
spec:
  podSelector:
    matchLabels:
       app.kubernetes.io/component: manager
  policyTypes:
    - Ingress
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            metrics: enabled
      ports:
        - port: 8443
          protocol: TCP
