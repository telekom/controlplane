apiVersion: v1
kind: Service
metadata:
  name: controlplane-api
  namespace: system
  labels:
    app.kubernetes.io/name: controlplane-api
    app.kubernetes.io/component: manager
spec:
  ports:
    - name: https
      port: 443
      targetPort: 8443
  selector:
    app.kubernetes.io/component: manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: controlplane-api
  namespace: system
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        app.kubernetes.io/name: controlplane-api
        app.kubernetes.io/component: manager
    spec:
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: manager
          args:
            - --configfile
            - /etc/controlplane-api/config.yaml
          image: ghcr.io/telekom/controlplane/controlplane-api:stable
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: controlplane-db
                  key: url
          envFrom:
            - configMapRef:
                name: controlplane-api-env
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /readyz
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 32Mi
          volumeMounts:
            - name: controlplane-api-config
              mountPath: /etc/controlplane-api
              readOnly: true
      serviceAccountName: controlplane-api
      terminationGracePeriodSeconds: 10
      volumes:
        - name: controlplane-api-config
          configMap:
            name: controlplane-api-config
