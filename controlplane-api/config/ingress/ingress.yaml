apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: controlplane-api-ingress
  namespace: system
spec:
  rules:
  - host: controlplane-api.example.com  # Example host that can be overridden via kustomize
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: controlplane-api
            port:
              number: 443
