apiVersion: apps/v1
kind: Deployment
metadata:
  name: projector-controller-manager
  namespace: system
  labels:
    control-plane: controller-manager
    app.kubernetes.io/name: projector
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: controller-manager
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: controller-manager
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: manager
          image: ghcr.io/telekom/controlplane/projector:stable
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: controlplane-db
                  key: url
          envFrom:
            - configMapRef:
                name: projector-env
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 10m
              memory: 128Mi
      serviceAccountName: projector-controller-manager
      terminationGracePeriodSeconds: 10
