  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: eventexposures.event.cp.ei.telekom.de
spec:
  group: event.cp.ei.telekom.de
  names:
    kind: EventExposure
    listKind: EventExposureList
    plural: eventexposures
    singular: eventexposure
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The event type identifier
      jsonPath: .spec.eventType
      name: EventType
      type: string
    - description: Whether this exposure is active
      jsonPath: .status.active
      name: Active
      type: boolean
    - description: Creation timestamp
      jsonPath: .metadata.creationTimestamp
      name: CreatedAt
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: |-
          EventExposure is the Schema for the eventexposures API.
          It represents a declaration that an application publishes events of a specific type,
          making them available for subscription by other applications.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: EventExposureSpec defines the desired state of EventExposure.
            properties:
              additionalPublisherIds:
                description: |-
                  AdditionalPublisherIds allows multiple application IDs to publish to the same event type.
                  Todo: rethink this approach and consider a decoupling
                items:
                  type: string
                type: array
              approval:
                description: Approval configures how subscriptions to this event are
                  approved.
                properties:
                  strategy:
                    default: Auto
                    description: Strategy defines the approval mode.
                    enum:
                    - Auto
                    - Simple
                    - FourEyes
                    type: string
                  trustedTeams:
                    description: |-
                      TrustedTeams identifies teams that are trusted for approving subscriptions.
                      By default your own team is trusted.
                    items:
                      type: string
                    maxItems: 10
                    minItems: 0
                    type: array
                required:
                - strategy
                type: object
              eventType:
                description: |-
                  EventType is the dot-separated event type identifier (e.g. "de.telekom.eni.quickstart.v1").
                  References the EventType CR via MakeEventTypeName() conversion.
                minLength: 1
                type: string
              provider:
                description: Provider identifies the providing application.
