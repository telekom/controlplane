                      Cannot be updated.
                      In CamelCase.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - name
                - namespace
                type: object
              scopes:
                description: Scopes defines named scopes with optional publisher-side
                  trigger filtering.
                items:
                  description: |-
                    EventScope defines a named scope with optional trigger-based filtering for event exposure.
                    Scopes allow publishers to partition their events and apply publisher-side filters.
                  properties:
                    name:
                      description: Name is the unique identifier for this scope.
                      minLength: 1
                      type: string
                    trigger:
                      description: Trigger defines publisher-side filtering criteria
                        for this scope.
                      properties:
                        responseFilter:
                          description: ResponseFilter controls payload shaping (which
                            fields to return).
                          properties:
                            mode:
                              default: Include
                              description: Mode controls whether the listed paths
                                are included or excluded.
                              enum:
                              - Include
                              - Exclude
                              type: string
                            paths:
                              description: Paths lists the JSON paths to include or
                                exclude from the event payload.
                              items:
                                type: string
                              type: array
                          type: object
                        selectionFilter:
                          description: SelectionFilter controls event matching (which
                            events to deliver).
                          properties:
                            attributes:
                              additionalProperties:
                                type: string
                              description: |-
                                Attributes defines simple key-value equality matches on CloudEvents attributes.
                                All entries are AND-ed together.
                              type: object
                            expression:
                              description: |-
                                Expression contains an arbitrary JSON filter expression tree
                                using logical operators (and, or) and comparisons (eq, ge, gt, le, lt, ne)
                                that is passed through to the configuration backend without structural validation.
                              x-kubernetes-preserve-unknown-fields: true
                          type: object
                      type: object
                  required:
                  - name
                  type: object
                type: array
              visibility:
                default: Enterprise
                description: Visibility defines who can see and subscribe to this
                  event.
                enum:
                - World
                - Zone
                - Enterprise
                type: string
              zone:
                description: Zone references the Zone CR where this event is exposed.
                properties:
