---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: realms.identity.cp.ei.telekom.de
spec:
  group: identity.cp.ei.telekom.de
  names:
    kind: Realm
    listKind: RealmList
    plural: realms
    singular: realm
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: Realm is the Schema for the realms API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RealmSpec defines the desired state of Realm
            properties:
              identityProvider:
                description: |-
                  ObjectRef is a reference to a Kubernetes object
                  It is similar to types.NamespacedName but has the required json tags for serialization
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - name
                - namespace
                type: object
              secretRotation:
                description: |-
                  SecretRotation configures the Keycloak client-secret rotation policy
                  for this realm. When set, the controller ensures a client-policy
                  profile + policy with the given grace period exists in Keycloak.
                  When nil, the controller does not manage rotation policy.
                properties:
                  expirationPeriod:
                    description: |-
                      ExpirationPeriod is how long a client secret is valid before it must
                      be rotated, specified as a duration string (e.g. "696h", "2505600s").
                      Maps to Keycloak's "expiration-period".
                    type: string
                  gracePeriod:
                    description: |-
                      GracePeriod is how long the old client secret remains valid after
                      rotation, specified as a duration string (e.g. "1h", "300s", "30m").
                      Maps to Keycloak's "rotated-expiration-period".
                    type: string
                  remainingRotationPeriod:
                    description: |-
                      RemainingRotationPeriod is the window before secret expiry during
                      which rotation is allowed, specified as a duration string (e.g. "240h", "864000s").
                      Maps to Keycloak's "remaining-rotation-period".

                      Keycloak blocks rotation attempts that fall outside this window. For
                      example, if ExpirationPeriod is 29 days and RemainingRotationPeriod
                      is 10 days, rotation is only permitted in the last 10 days before
                      expiry. Setting RemainingRotationPeriod equal to ExpirationPeriod
                      allows rotation at any time (recommended, since the controller
                      drives rotation externally rather than relying on Keycloak's
                      expiration timer).
                    type: string
                required:
                - expirationPeriod
                - gracePeriod
                - remainingRotationPeriod
                type: object
            required:
            - identityProvider
            type: object
          status:
            description: RealmStatus defines the observed state of Realm
            properties:
              adminClientId:
                type: string
              adminPassword:
                type: string
              adminTokenUrl:
                type: string
              adminUrl:
                type: string
              adminUserName:
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              issuerUrl:
                type: string
            required:
            - adminClientId
            - adminPassword
            - adminTokenUrl
            - adminUrl
            - adminUserName
            - issuerUrl
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
