# Adds namespace to all resources.
namespace: controlplane-system

# Labels to add to all resources and selectors.
labels:
- includeSelectors: true
  pairs:
    domain: rover
  fields:
    - path: spec/selector/matchLabels
      create: true
      kind: ServiceMonitor
      group: monitoring.coreos.com

resources:
  - ../rbac
  - ../server
  - ../ingress
  - ../certmanager
  # [PROMETHEUS] To enable prometheus monitor, uncomment all sections with 'PROMETHEUS'.
  - ../prometheus
  # [METRICS] Expose the controller manager metrics service.
  - metrics_service.yaml

# Default configuration
# Use your own kustomization file to override the default configuration.
configMapGenerator:
  - name: rover-server-env
    options:
      disableNameSuffixHash: true
    literals:
      - SECURITY_TRUSTEDISSUERS=""
      - SECURITY_LMS_BASEPATH=""
      - DATABASE_FILEPATH=""

patches:
  # [SECRET_MANAGER] The following patch will add the secret manager to the deployment.
  - path: deployment_patch.yaml
    target:
      kind: Deployment
  - path: namespace_patch.yaml
    target:
      kind: Namespace
  # [INGRESS] The following patch allows overriding the ingress host. Adjust it as needed.
  # - path: ingress_host_patch.yaml
  #   target:
  #     kind: Ingress
  #     name: rover-server-ingress

# Substitute the serving Service name/namespace into the Certificate dnsNames.
replacements:
  - source:
      kind: Service
      version: v1
      name: rover-server-service
      fieldPath: .metadata.name
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: "."
          index: 0
          create: true
  - source:
      kind: Service
      version: v1
      name: rover-server-service
      fieldPath: .metadata.namespace
    targets:
      - select:
          kind: Certificate
          group: cert-manager.io
          version: v1
        fieldPaths:
          - .spec.dnsNames.0
          - .spec.dnsNames.1
        options:
          delimiter: "."
          index: 1
          create: true
