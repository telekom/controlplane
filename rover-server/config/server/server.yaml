apiVersion: apps/v1
kind: Deployment
metadata:
  name: rover-server
  namespace: system
  labels:
    control-plane: rover-server
    app.kubernetes.io/name: rover-server
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: rover-server
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: rover-server
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - args: []
          env: []
          envFrom:
            - configMapRef:
                name: rover-server-env
          image: ghcr.io/telekom/controlplane/rover-server:stable
          name: server
          ports:
            - name: https
              containerPort: 8443
              protocol: TCP
            - name: internal
              containerPort: 9443
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              scheme: HTTPS
              path: /healthz
              port: 8443
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              scheme: HTTPS
              path: /readyz
              port: 8443
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 30m
              memory: 64Mi
          volumeMounts:
            - name: db-data
              mountPath: /data
            - name: cert-volume
              mountPath: /etc/tls
              readOnly: true
      volumes:
        - name: db-data
          emptyDir: {}
        - name: cert-volume
          secret:
            secretName: rover-server-cert
      serviceAccountName: rover-server
      terminationGracePeriodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  labels:
    control-plane: rover-server
    app.kubernetes.io/name: rover-server
    app.kubernetes.io/managed-by: kustomize
  name: rover-server-service
  namespace: system
spec:
  ports:
  - name: https
    port: 443
    protocol: TCP
    targetPort: 8443
  - name: internal
    port: 9443
    protocol: TCP
    targetPort: 9443
  selector:
    control-plane: rover-server
