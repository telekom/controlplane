---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: subscribers.pubsub.cp.ei.telekom.de
spec:
  group: pubsub.cp.ei.telekom.de
  names:
    kind: Subscriber
    listKind: SubscriberList
    plural: subscribers
    singular: subscriber
  scope: Namespaced
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Subscriber is the Schema for the subscribers API.
          It represents an event subscription registration in the configuration backend.
          Subscriber resources are created and managed by the EventSubscription handler in the event domain.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SubscriberSpec defines the desired state of Subscriber.
              Subscriber represents an event subscription registration in the configuration backend.
              It is created by the EventSubscription handler in the event domain.
            properties:
              appliedScopes:
                description: |-
                  AppliedScopes lists the scope names that this subscriber is subscribed to.
                  These must match scope names defined on the corresponding EventExposure/Publisher.
                items:
                  type: string
                type: array
              delivery:
                description: Delivery configures how events are delivered to the subscriber.
                properties:
                  callback:
                    description: |-
                      Callback is the URL where events are delivered.
                      Required when type is "callback", must not be set for "ServerSentEvent".
                    type: string
                  circuitBreakerOptOut:
                    description: CircuitBreakerOptOut disables the circuit breaker
                      for this subscription.
                    type: boolean
                  enforceGetHttpRequestMethodForHealthCheck:
                    description: EnforceGetHttpRequestMethodForHealthCheck forces
                      GET for health check probes instead of HEAD.
                    type: boolean
                  eventRetentionTime:
                    description: EventRetentionTime defines how long events are retained
                      for this subscriber.
                    type: string
                  payload:
                    default: Data
                    description: Payload defines the event payload format.
                    enum:
                    - Data
                    - DataRef
                    type: string
                  redeliveriesPerSecond:
                    description: RedeliveriesPerSecond limits the rate of event redeliveries.
                    type: integer
                  retryableStatusCodes:
                    description: RetryableStatusCodes defines HTTP status codes that
                      should trigger a retry.
                    items:
                      type: integer
                    type: array
                  type:
                    default: Callback
                    description: Type defines the delivery mechanism.
                    enum:
                    - Callback
                    - ServerSentEvent
                    type: string
                required:
                - payload
                - type
                type: object
                x-kubernetes-validations:
                - message: callback is required for deliveryType 'Callback' and must
                    not be set for 'ServerSentEvent'
                  rule: 'self.type == ''Callback'' ? self.callback != "" : !has(self.callback)'
              publisher:
                description: |-
                  Publisher references the Publisher CR that this subscriber subscribes to.
                  The Subscriber controller resolves the Publisher at runtime to obtain
                  EventType, PublisherId, AdditionalPublisherIds, and EventStore details.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                  uid:
                    description: |-
                      UID is a type that holds unique ID values, including UUIDs.  Because we
                      don't ONLY use UUIDs, this is an alias to string.  Being a type captures
                      intent and helps make sure that UIDs and names do not get conflated.
                    type: string
                required:
                - name
                - namespace
                type: object
              publisherTrigger:
                description: |-
                  PublisherTrigger defines publisher-side filtering criteria applied to this subscriber.
                  Derived from the matching scope on the EventExposure.
                properties:
                  responseFilter:
                    description: ResponseFilter controls payload shaping (which fields
                      to return).
                    properties:
                      mode:
                        default: Include
                        description: Mode controls whether the listed paths are included
                          or excluded.
                        enum:
                        - Include
                        - Exclude
                        type: string
                      paths:
                        description: Paths lists the JSON paths to include or exclude
                          from the event payload.
                        items:
                          type: string
                        type: array
                    type: object
                  selectionFilter:
                    description: SelectionFilter controls event matching (which events
                      to deliver).
                    properties:
                      attributes:
                        additionalProperties:
                          type: string
                        description: |-
                          Attributes defines simple key-value equality matches on CloudEvents attributes.
                          All entries are AND-ed together.
                        type: object
                      expression:
                        description: |-
                          Expression contains an arbitrary JSON filter expression tree
                          using logical operators (and, or) and comparisons (eq, ge, gt, le, lt, ne)
                          that is passed through to the configuration backend without structural validation.
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                type: object
              subscriberId:
                description: |-
                  SubscriberId is the unique identifier for this subscriber in the configuration backend.
                  Typically derived from the consuming application's identifier.
                minLength: 1
                type: string
              trigger:
                description: Trigger defines subscriber-side filtering criteria for
                  event delivery.
                properties:
                  responseFilter:
                    description: ResponseFilter controls payload shaping (which fields
                      to return).
                    properties:
                      mode:
                        default: Include
                        description: Mode controls whether the listed paths are included
                          or excluded.
                        enum:
                        - Include
                        - Exclude
                        type: string
                      paths:
                        description: Paths lists the JSON paths to include or exclude
                          from the event payload.
                        items:
                          type: string
                        type: array
                    type: object
                  selectionFilter:
                    description: SelectionFilter controls event matching (which events
                      to deliver).
                    properties:
                      attributes:
                        additionalProperties:
                          type: string
                        description: |-
                          Attributes defines simple key-value equality matches on CloudEvents attributes.
                          All entries are AND-ed together.
                        type: object
                      expression:
                        description: |-
                          Expression contains an arbitrary JSON filter expression tree
                          using logical operators (and, or) and comparisons (eq, ge, gt, le, lt, ne)
                          that is passed through to the configuration backend without structural validation.
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                type: object
            required:
            - delivery
            - publisher
            - subscriberId
            type: object
          status:
            description: SubscriberStatus defines the observed state of Subscriber.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              subscriptionId:
                description: |-
                  SubscriptionId is the self-assigned subscription identifier.
                  Populated after the subscription is successfully registered with the configuration backend.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
