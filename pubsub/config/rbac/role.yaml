---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - pubsub.cp.ei.telekom.de
  resources:
  - eventstores
  - publishers
  - subscribers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - pubsub.cp.ei.telekom.de
  resources:
  - eventstores/finalizers
  - publishers/finalizers
  - subscribers/finalizers
  verbs:
  - update
- apiGroups:
  - pubsub.cp.ei.telekom.de
  resources:
  - eventstores/status
  - publishers/status
  - subscribers/status
  verbs:
  - get
  - patch
  - update
