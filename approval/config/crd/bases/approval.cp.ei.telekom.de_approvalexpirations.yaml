                        this threshold.
                      format: date-time
                      type: string
                    threshold:
                      description: |-
                        Threshold is the key identifying which threshold triggered this reminder.
                        It is the string representation of the Threshold.Before duration (e.g. "720h0m0s").
                      type: string
