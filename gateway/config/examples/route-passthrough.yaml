# Plain passthrough Route: no trusted issuers and passThrough=true, so the
# Envoy AccessControl feature emits no jwt_authn/RBAC filters and the request
# is proxied straight to the upstream (listener -> cluster -> upstream).
apiVersion: gateway.cp.ei.telekom.de/v1
kind: Route
metadata:
  name: passthrough-route
  namespace: default
  labels:
    cp.ei.telekom.de/environment: poc
spec:
  gatewayRef:
    name: envoy-gateway
    namespace: default
  type: primary
  paths:
    - /anything
  passThrough: true
  security:
    realmName: poc-realm
    trustedIssuers:
      - https://iris-distcp1-dataplane1.dev.dhei.telekom.de/auth/realms/rover
  traffic: {}
  backend:
    upstreams:
      - scheme: http
        hostname: httpbin.org
        port: 80
        path: /
