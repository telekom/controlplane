apiVersion: gateway.cp.ei.telekom.de/v1
kind: Gateway
metadata:
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/managed-by: kustomize
    cp.ei.telekom.de/environment: default
  name: kgateway-sample
spec:
  type: kgateway
  # remoteCluster points kgateway resource provisioning at the target cluster.
  # The secret is generated by kustomization.yaml from the kubeconfig.yaml in
  # this directory. Omit remoteCluster to provision on the local (operator)
  # cluster instead.
  remoteCluster:
    secretRef:
      name: kgateway-remote-kubeconfig
      namespace: default
    key: kubeconfig
  # admin is unused by the kgateway builder (it applies CRs, not admin-API
  # calls) but the CRD requires it.
  admin:
    url: unused
    clientId: unused
    clientSecret: unused
    issuerUrl: unused
