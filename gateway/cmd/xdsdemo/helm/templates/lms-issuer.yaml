apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "xdsdemo.componentName" (dict "root" . "component" "lms-issuer") }}
  labels:
    {{- include "xdsdemo.labels" . | nindent 4 }}
    {{- include "xdsdemo.selectorLabels" (dict "root" . "component" "lms-issuer") | nindent 4 }}
spec:
  replicas: {{ .Values.lmsIssuer.replicaCount }}
  selector:
    matchLabels:
      {{- include "xdsdemo.selectorLabels" (dict "root" . "component" "lms-issuer") | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "xdsdemo.selectorLabels" (dict "root" . "component" "lms-issuer") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: lms-issuer
          image: {{ include "xdsdemo.image" .Values.lmsIssuer.image | quote }}
          imagePullPolicy: {{ .Values.lmsIssuer.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: grpc
              containerPort: 9002
          readinessProbe:
            tcpSocket:
              port: grpc
          livenessProbe:
            tcpSocket:
              port: grpc
          resources:
            {{- toYaml .Values.lmsIssuer.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  # The xDS-generated ext_authz cluster resolves this fixed service name.
  name: lms-issuer
  labels:
    {{- include "xdsdemo.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "xdsdemo.selectorLabels" (dict "root" . "component" "lms-issuer") | nindent 4 }}
  ports:
    - name: grpc
      port: 9002
      targetPort: grpc