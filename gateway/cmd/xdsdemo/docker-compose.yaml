services:
  operator:
    build:
      context: ../../..
      dockerfile: gateway/cmd/xdsdemo/Dockerfile
    command:
      - operator
      - -management-address=management:18000
      - -target-file=/state/target-id
    environment:
      NO_PROXY: management
      no_proxy: management
    volumes:
      - target-state:/state
    ports:
      - "${CONTROL_PORT:-18081}:18081"
    healthcheck:
      test: ["CMD", "/xdsdemo", "health", "http://127.0.0.1:18081/targetz"]
      interval: 2s
      timeout: 2s
      retries: 30

  management:
    build:
      context: ../../..
      dockerfile: gateway/cmd/xdsdemo/Dockerfile
    command:
      - management
      - -target-file=/state/target-id
      - --
      - -database=/data/xds.db
      - -grpc-address=:18000
      - -health-address=:8080
    volumes:
      - target-state:/state:ro
      - xds-data:/data
    ports:
      - "${MANAGEMENT_GRPC_PORT:-18000}:18000"
      - "${MANAGEMENT_HEALTH_PORT:-18080}:8080"
    depends_on:
      operator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/xdsdemo", "health", "http://127.0.0.1:8080/readyz"]
      interval: 2s
      timeout: 2s
      retries: 30

  envoy-a:
    image: envoyproxy/envoy:v1.37-latest
    command: ["-c", "/etc/envoy/envoy-bootstrap.yaml", "--service-node", "demo-envoy-a", "--service-cluster", "xdsdemo"]
    volumes:
      - ./envoy-bootstrap.yaml:/etc/envoy/envoy-bootstrap.yaml:ro
    ports:
      - "${ENVOY_A_PORT:-10000}:10000"
      - "${ENVOY_A_ADMIN_PORT:-9901}:9901"
    depends_on:
      management:
        condition: service_healthy
      upstream:
        condition: service_started
      lms-issuer:
        condition: service_started

  envoy-b:
    image: envoyproxy/envoy:v1.37-latest
    command: ["-c", "/etc/envoy/envoy-bootstrap.yaml", "--service-node", "demo-envoy-b", "--service-cluster", "xdsdemo"]
    volumes:
      - ./envoy-bootstrap.yaml:/etc/envoy/envoy-bootstrap.yaml:ro
    ports:
      - "${ENVOY_B_PORT:-10001}:10000"
      - "${ENVOY_B_ADMIN_PORT:-9902}:9901"
    depends_on:
      management:
        condition: service_healthy
      upstream:
        condition: service_started
      lms-issuer:
        condition: service_started

  lms-issuer:
    build:
      context: ../../..
      dockerfile: gateway/cmd/xdsdemo/Dockerfile
    entrypoint: ["/lms-issuer"]
    expose:
      - "9002"

  upstream:
    image: mccutchen/go-httpbin:latest
    networks:
      default:
        ipv4_address: 172.30.0.10
    expose:
      - "80"
    environment:
      - PORT=80

volumes:
  target-state:
  xds-data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.30.0.0/24
