---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - admin.cp.ei.telekom.de
  resources:
  - zones
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agentic.cp.ei.telekom.de
  resources:
  - agenticexposures
  - agenticservers
  - agenticsubscriptions
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - agentic.cp.ei.telekom.de
  resources:
  - agenticexposures/finalizers
  - agenticservers/finalizers
  - agenticsubscriptions/finalizers
