  - update
- apiGroups:
  - agentic.cp.ei.telekom.de
  resources:
  - agenticexposures/status
  - agenticservers/status
  - agenticsubscriptions/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - application.cp.ei.telekom.de
